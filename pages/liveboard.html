<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Board - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            /* slate-50 (สว่าง) */
            color: #1e293b;
            /* slate-800 */
        }

        /* Animation สำหรับ Emoji ลอยจาง (ปรับขนาดเล็กลง) */
        @keyframes floatFade {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }

            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }

            100% {
                transform: translateY(-150px) scale(1.2);
                opacity: 0;
            }
        }

        .emoji-float {
            position: fixed;
            bottom: 80px;
            font-size: 4rem;
            /* ลดขนาดลงจาก 8rem */
            pointer-events: none;
            z-index: 999;
            animation: floatFade 2s ease-out forwards;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.1));
        }

        /* การ์ดคำตอบ: ขนาดเล็กลง */
        .response-card {
            animation: cardEnter 0.5s ease-out;
            background: white;
            border: 1px solid #e2e8f0;
            /* slate-200 */
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
        }

        /* เปลี่ยน Glow ให้เข้ากับพื้นหลังสว่าง */
        .text-glow {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        #live-responses {
    max-height: 70vh; /* จำกัดความสูง */
    overflow-y: auto; /* ให้เลื่อนได้เฉพาะส่วนนี้ */
}
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Header: โทนขาวสะอาด -->
    <header class="p-6 flex justify-between items-end border-b border-slate-200 bg-white/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <img src="../assets/logo.png" class="h-14 w-14">
            <div>
                <h1 id="display-room" class="text-2xl font-black text-blue-600 tracking-tight">ROOM -</h1>
                <p id="display-subject" class="text-sm font-bold text-slate-400 uppercase tracking-widest">WAITING FOR
                    SESSION</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Responses</p>
            <p id="response-count" class="text-4xl font-black text-slate-800 tabular-nums">0</p>
        </div>
    </header>

    <!-- Main Section -->
    <main class="flex-1 p-8 flex flex-col gap-8 overflow-hidden">

        <!-- Question Area: ปรับให้เล็กลงและดูคลีนขึ้น -->
        <section class="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm">
            <div class="flex flex-col gap-2">
                <span class="text-blue-500 font-black uppercase tracking-widest text-xs">Current Activity</span>
                <h2 id="live-question" class="text-4xl md:text-5xl font-black leading-tight text-slate-800 italic">
                    กำลังรอคำถามจากพี่ติวเตอร์...
                </h2>
            </div>
        </section>

        <!-- Responses Grid: ปรับ Grid ให้รองรับการ์ดขนาดเล็กลง -->
        <section id="live-responses"
            class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto custom-scrollbar pb-10">
            <!-- คำตอบจะแสดงที่นี่ -->
        </section>
    </main>

    <!-- Randomizer Overlay: ปรับเป็นโทนสว่าง -->
    <div id="random-overlay"
        class="hidden fixed inset-0 z-[200] bg-white/95 backdrop-blur-md flex flex-col items-center justify-center">
        <div class="text-center">
            <h2 id="random-status"
                class="text-blue-600 text-xl font-black uppercase tracking-[0.8em] mb-10 animate-pulse">RANDOMIZING</h2>
            <div class="relative h-64 flex items-center justify-center">
                <div id="spotlight" class="absolute inset-0 bg-blue-100 blur-[80px] rounded-full scale-150"></div>
                <div id="random-name-display"
                    class="relative text-7xl md:text-9xl font-black text-slate-800 italic tracking-tighter transition-all">
                    ...
                </div>
            </div>
            <div id="random-house-display" class="mt-6 text-2xl font-black text-slate-300 uppercase tracking-widest">
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"
        }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/liveboard-logic.js"></script>
</body>

</html>
