<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medentor Camp</title>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        .login-card {
            animation: slideUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-active {
            color: #2563eb;
            background: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 overflow-x-hidden">

    <div class="login-card max-w-md w-full bg-white/90 p-8 rounded-[2rem] shadow-2xl border border-white/50">

        <!-- Header Section -->
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-50 p-4 rounded-3xl mb-4 shadow-inner">
                <img src="../assets/logo.png" alt="Logo" class="h-16 w-16 object-contain drop-shadow-lg">
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">เข้าสู่ระบบ</h2>
            <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Medentor Camp System</p>
        </div>

        <!-- Tab Menu (Only Student & Staff) -->
        <div class="flex mb-8 bg-slate-100 p-1.5 rounded-2xl">
            <button onclick="showTab('student')" id="btn-student"
                class="flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 tab-active">นักเรียน</button>
            <button onclick="showTab('staff')" id="btn-staff"
                class="flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 text-slate-500">พี่สตาฟ</button>
        </div>

        <!-- [Form] Student Login -->
        <div id="form-student" class="space-y-4 transition-all duration-500">
            <div class="group">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">รหัสประจำตัว</label>
                <input type="text" id="std-id" placeholder="ตัวอย่าง: 101"
                    class="input-focus w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500">
            </div>
            <div class="group">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">บ้านที่อยู่</label>
                <input type="text" id="std-house" placeholder="บ้านหมายเลข 1-8"
                    class="input-focus w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500">
            </div>
            <div class="group">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">ชื่อเล่น</label>
                <input type="text" id="std-nick" placeholder="ชื่อเล่นภาษาไทย"
                    class="input-focus w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500">
            </div>
            <button onclick="doStudentLogin()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">
                เข้าสู่ระบบ
            </button>
        </div>

        <!-- [Form] Staff Login -->
        <div id="form-staff" class="space-y-4 hidden transition-all duration-500">
            <p class="text-[13px] text-red-500">
            สำหรับสตาฟที่เข้าครั้งแรกรหัสผ่านคือ <b>รหัสนักศึกษา</b> อย่าลืมเปลี่ยนรหัสผ่านหลังจากเข้าสู่ระบบครั้งแรกเพื่อความปลอดภัยของบัญชี
            </p>
            <div class="group">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">รหัสนักศึกษา (StudentID)</label>
                <input type="text" id="staff-id" placeholder="ระบุรหัสประจำตัวพี่สตาฟ"
                    class="input-focus w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500">
            </div>
            <div class="group">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">รหัสผ่าน</label>
                <div class="relative">
                    <input type="password" id="staff-pw" placeholder="••••••••"
                        class="input-focus w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500">
                    <button type="button" onclick="togglePassword('staff-pw')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-purple-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="text-right">
                <button onclick="showResetForm()"
                    class="text-xs font-bold text-purple-600 hover:underline">ลืมรหัสผ่านใช่หรือไม่?</button>
            </div>
            <button onclick="doStaffLogin()"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-purple-200 transition-all active:scale-95">
                เข้าสู่ระบบ
            </button>
        </div>

        <!-- [Form] Reset Password (Inline for Staff) -->
        <div id="form-reset" class="space-y-4 hidden">
            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 mb-4">
                <p class="text-[10px] text-orange-600 text-center font-black uppercase tracking-widest">
                    🔐 ยืนยันตัวตนพี่สตาฟเพื่อเปลี่ยนรหัส
                </p>
            </div>
            <input type="text" id="re-id" placeholder="StudentID"
                class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
            <input type="text" id="re-name" placeholder="ชื่อ-นามสกุล"
                class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
            <input type="text" id="re-nick" placeholder="ชื่อเล่น"
                class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="re-year" placeholder="ปี (1/2)"
                    class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                <input type="text" id="re-fac" placeholder="คณะ (MD/Dent)"
                    class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
            </div>
            <div class="space-y-2">
                <input type="password" id="re-newpw" placeholder="ตั้งรหัสผ่านใหม่"
                    class="w-full p-3 bg-yellow-50 border border-yellow-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-yellow-500 outline-none">
                <input type="password" id="re-confirmpw" placeholder="ยืนยันรหัสผ่านใหม่อีกครั้ง"
                    class="w-full p-3 bg-yellow-50 border border-yellow-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-yellow-500 outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="showTab('staff')"
                    class="flex-1 bg-slate-200 text-slate-600 py-3 rounded-xl font-bold text-sm">ยกเลิก</button>
                <button onclick="doResetPassword()"
                    class="flex-[2] bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold text-sm">เปลี่ยนรหัสทันที</button>
            </div>
        </div>
    </div>

    <script>
        function showTab(type) {
            const forms = ['student', 'staff', 'reset'];
            forms.forEach(f => document.getElementById('form-' + f).classList.add('hidden'));

            // UI Update
            const btnStd = document.getElementById('btn-student');
            const btnStaff = document.getElementById('btn-staff');

            if (type === 'student') {
                btnStd.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 tab-active";
                btnStaff.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 text-slate-500";
            } else if (type === 'staff') {
                btnStaff.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 tab-active text-purple-600";
                btnStd.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300 text-slate-500";
            }

            document.getElementById('form-' + type).classList.remove('hidden');
        }

        function showResetForm() {
            document.getElementById('form-staff').classList.add('hidden');
            document.getElementById('form-reset').classList.remove('hidden');
        }

        async function doStudentLogin() {
            const res = await loginStudent(
                document.getElementById('std-id').value,
                document.getElementById('std-house').value,
                document.getElementById('std-nick').value
            );
            if (res.success) {
                Swal.fire({
                    icon: 'success',
                    title: 'ยินดีต้อนรับน้องๆ!',
                    text: 'กำลังเข้าสู่ระบบกิจกรรม...',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => window.location.href = "../index.html");
            } else {
                Swal.fire('ข้อมูลไม่ถูกต้อง', res.message, 'error');
            }
        }

        async function doStaffLogin() {
            const res = await loginStaff(
                document.getElementById('staff-id').value,
                document.getElementById('staff-pw').value
            );
            if (res.success) {
                Swal.fire({
                    icon: 'success',
                    title: 'พี่สตาฟเข้าสู่ระบบสำเร็จ',
                    timer: 1000,
                    showConfirmButton: false
                }).then(() => window.location.href = "../index.html");
            } else {
                Swal.fire('เข้าสู่ระบบไม่สำเร็จ', res.message, 'error');
            }
        }

        function togglePassword(inputId) {
                const input = document.getElementById(inputId);
                input.type = input.type === 'password' ? 'text' : 'password';
            }

        async function doResetPassword() {
                const newPw = document.getElementById('re-newpw').value;
                const confirmPw = document.getElementById('re-confirmpw').value;

                // ตรวจสอบว่ากรอกรหัสผ่านหรือไม่
                if (!newPw || !confirmPw) {
                    Swal.fire('กรุณากรอกข้อมูล', 'กรุณาระบุรหัสผ่านใหม่ทั้ง 2 ช่อง', 'warning');
                    return;
                }

                // ตรวจสอบรหัสผ่าน 2 รอบ
                if (newPw !== confirmPw) {
                    Swal.fire('รหัสผ่านไม่ตรงกัน', 'กรุณาตรวจสอบการกรอกรหัสผ่านใหม่อีกครั้ง', 'error');
                    return;
                }

                // ถ้าผ่านเงื่อนไข ให้ส่งไปบันทึก
                const res = await resetStaffPassword(
                    document.getElementById('re-id').value,
                    document.getElementById('re-name').value,
                    document.getElementById('re-nick').value,
                    document.getElementById('re-year').value,
                    document.getElementById('re-fac').value,
                    newPw
                );

                if (res.success) {
                    Swal.fire('สำเร็จ!', 'เปลี่ยนรหัสผ่านแล้ว กรุณาเข้าสู่ระบบอีกครั้ง', 'success');
                    // ล้างค่าในช่องกรอก
                    document.getElementById('re-newpw').value = "";
                    document.getElementById('re-confirmpw').value = "";
                    showTab('staff');
                } else {
                    Swal.fire('ยืนยันตัวตนไม่สำเร็จ', res.message, 'error');
                }
            }
    </script>
</body>

</html>
