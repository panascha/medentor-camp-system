<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกคะแนน - Medentor System</title>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuse.js สำหรับ Fuzzy Search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <div class="flex items-center justify-between mb-8">
            <a href="../index.html" class="text-blue-600 flex items-center gap-1 font-semibold hover:underline">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                        clip-rule="evenodd" />
                </svg>
                กลับหน้าหลัก
            </a>
        
            <!-- เพิ่มโลโก้ตรงนี้ -->
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <h1 class="text-xl font-bold text-slate-800 leading-tight">บันทึกคะแนนสอบ</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Medentor Academic</p>
                </div>
                <img src="../assets/logo.png" alt="Logo"
                    class="h-12 w-12 object-contain rounded-full bg-white p-1 shadow-sm border">
            </div>
        </div>

        <!-- Mode Toggle & Search -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200">
            <div class="flex gap-4 mb-6">
                <button id="btn-pre" onclick="setMode('pretest')"
                    class="flex-1 py-3 rounded-xl font-bold transition-all border-2 border-blue-600 bg-blue-600 text-white">Pre-test</button>
                <button id="btn-post" onclick="setMode('posttest')"
                    class="flex-1 py-3 rounded-xl font-bold transition-all border-2 border-slate-200 text-slate-400">Post-test</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ค้นหารหัสน้อง (ID)</label>
                    <input type="text" id="input-id" placeholder="เช่น 101"
                        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="relative">
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ค้นหาจากชื่อ</label>
                    <input type="text" id="input-name" placeholder="พิมพ์ชื่อเพื่อค้นหา..."
                        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="suggest-box" class="absolute z-10 w-full bg-white border rounded-xl mt-1 shadow-xl hidden">
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Scores -->
        <div id="score-form" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
            <div class="flex items-center gap-4 mb-6 p-4 bg-blue-50 rounded-xl">
                <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xl"
                    id="display-id"></div>
                <div>
                    <h2 class="font-bold text-lg text-slate-800" id="display-name">เลือกนักเรียน</h2>
                    <p class="text-sm text-slate-500" id="display-house">บ้าน: -</p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Physic (15)</label>
                    <input type="number" id="s-phy" min="0" max="15" placeholder="0-15"
                        class="w-full p-3 border rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Chemistry (15)</label>
                    <input type="number" id="s-chem" min="0" max="15" placeholder="0-15"
                        class="w-full p-3 border rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Biology (6)</label>
                    <input type="number" id="s-bio" min="0" max="6" placeholder="0-6"
                        class="w-full p-3 border rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">IntroDent (12)</label>
                    <input type="number" id="s-dent" min="0" max="12" placeholder="0-12"
                        class="w-full p-3 border rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">IntroMed (12)</label>
                    <input type="number" id="s-med" min="0" max="12" placeholder="0-12"
                        class="w-full p-3 border rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <!-- เพิ่มส่วนแสดงคะแนนรวมแบบ Real-time (Optional) -->
            <div class="mb-6 p-4 bg-slate-100 rounded-xl text-center">
                <p class="text-sm text-slate-500 font-bold uppercase tracking-widest">คะแนนรวมทั้งหมด</p>
                <p class="text-3xl font-black text-slate-800"><span id="total-preview">0</span> <span
                        class="text-lg text-slate-400">/ 60</span></p>
            </div>

            <button onclick="submitScore()" id="btn-save"
                class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-black transition-all">
                บันทึกคะแนนลงระบบ
            </button>
        </div>

        <!-- Live Scoreboard -->
        <div class="max-w-4xl mx-auto p-4 md:p-8 mt-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                    <h2 class="font-bold flex items-center gap-2">
                        <span class="relative flex h-3 w-3">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        คะแนนที่บันทึกล่าสุด (Real-time)
                    </h2>
                    <span class="text-[10px] uppercase tracking-widest opacity-60">Live Scoreboard</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                            <tr>
                                <th class="p-4 border-b">ID</th>
                                <th class="p-4 border-b">ชื่อนักเรียน</th>
                                <th class="p-4 border-b">Pre-test/Post-test</th>
                                <th class="p-4 border-b text-center">คะแนนรวม</th>
                                <th class="p-4 border-b">ผู้บันทึก</th>
                                <th class="p-4 border-b text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="live-score-board" class="text-sm divide-y divide-slate-100">
                            <!-- ข้อมูลจะถูกเติมที่นี่โดย JS แบบ Real-time -->
                            <tr>
                                <td colspan="5" class="p-8 text-center text-slate-400 italic">กำลังเชื่อมต่อฐานข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"
            }
        }
        </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script type="module" src="../js/scoring-logic.js"></script>
</body>

</html>
