<!-- pages/materials-admin.html สำหรับพี่สตาฟ -->
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการไฟล์เรียน - Staff Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">
    <!-- Navigation -->
    <nav class="bg-white p-4 border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="p-2 hover:bg-slate-100 rounded-full transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h1 class="text-xl font-black text-slate-800">จัดการคลังไฟล์เรียน</h1>
            </div>
            <div id="staff-info" class="text-right hidden sm:block">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Logged in as</p>
                <p id="display-staff-name" class="text-xs font-bold text-slate-400">Staff Member</p>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-8">

        <!-- Section: Add New Material -->
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100" id="admin-form-container">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div id="form-icon"
                        class="w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <h2 id="form-title" class="text-lg font-black text-slate-800 uppercase italic">เพิ่มเอกสารใหม่</h2>
                </div>
                <button id="btn-cancel-edit" onclick="resetMaterialForm()"
                    class="hidden text-xs font-bold text-red-500 hover:underline">ยกเลิกการแก้ไข</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label
                        class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ชื่อเรียกไฟล์</label>
                    <input type="text" id="file-title" placeholder="เช่น สรุปเนื้อหาเคมีบทที่ 1"
                        class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-medium">
                </div>
                <div>
                    <label
                        class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">หมวดหมู่/วิชา</label>
                    <select id="file-subject"
                        class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-bold">
                        <option value="physic">ฟิสิกส์</option>
                        <option value="chemistry">เคมี</option>
                        <option value="biology">ชีววิทยา</option>
                        <option value="introdent">Intro Dent</option>
                        <option value="intromed">Intro Med</option>
                        <option value="general">ทั่วไป/กิจกรรม</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ลิงก์ Google
                        Drive (ต้องแชร์เป็น Public แล้ว)</label>
                    <div class="flex gap-2">
                        <input type="text" id="file-url" placeholder="https://drive.google.com/file/d/..."
                            class="flex-1 mt-1 p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-mono text-xs">
                            <div class="md:col-span-3">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ตั้งเวลาปล่อยไฟล์
                                    (ทิ้งว่างไว้ถ้าต้องการให้เห็นทันที)</label>
                                <input type="datetime-local" id="release-time"
                                    class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-medium">
                            </div>
                        <button onclick="previewLink()"
                            class="mt-1 bg-slate-100 text-slate-600 px-6 rounded-2xl font-bold text-xs hover:bg-slate-200 transition-all">ตรวจสอบ</button>
                    </div>
                </div>
                <button onclick="saveMaterial()" id="btn-submit"
                    class="md:col-span-3 bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all mt-2">
                    บันทึกลงฐานข้อมูล
                </button>
            </div>
        </div>

        <!-- Section: Material List -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b bg-slate-50/50 flex justify-between items-center">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">เอกสารทั้งหมดในระบบ</h2>
                <span id="file-count" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black">0
                    FILES</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white text-slate-400 text-[10px] uppercase font-black tracking-widest border-b">
                        <tr>
                            <th class="p-5">วิชา</th>
                            <th class="p-5">ชื่อเอกสาร</th>
                            <th class="p-5">ผู้อัปโหลด</th>
                            <th class="p-5 text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="material-list" class="divide-y divide-slate-50">
                        <!-- ข้อมูลจะโหลดมาที่นี่ -->
                        <tr>
                            <td colspan="4" class="p-20 text-center text-slate-300 italic">กำลังดึงข้อมูลเอกสาร...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js" }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let editingKey = null;
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, onValue, remove, set, get, update } from "firebase/database";

        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);
        const user = checkAuth();

        // Security Check
        if (!user || user.userType !== 'staff') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('display-staff-name').innerText = user.nickname || user.fullName;
        }

        const SUBJECT_MAP = {
            'physic': { name: 'ฟิสิกส์', color: 'blue' },
            'chemistry': { name: 'เคมี', color: 'orange' },
            'biology': { name: 'ชีววิทยา', color: 'emerald' },
            'introdent': { name: 'Intro Dent', color: 'purple' },
            'intromed': { name: 'Intro Med', color: 'red' },
            'general': { name: 'ทั่วไป', color: 'slate' }
        };

        // แปลงลิงก์ Drive ให้เป็น Direct Download
        function formatDriveUrl(url) {
            const regExp = /\/file\/d\/([^/]+)\//;
            const match = url.match(regExp);
            if (match && match[1]) {
                return `https://drive.google.com/uc?export=download&id=${match[1]}`;
            }
            return url;
        }

        window.previewLink = function () {
            const url = document.getElementById('file-url').value;
            if (!url) return Swal.fire("กรุณาวางลิงก์", "", "warning");
            window.open(url, '_blank');
        }

    // ฟังก์ชันสำหรับ Render ตารางใหม่ (เพิ่มปุ่ม Toggle และ Release Now)
    onValue(ref(db, 'learning_materials'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('material-list');
        if (!data) { tbody.innerHTML = "<tr><td colspan='4' class='p-10 text-center'>ไม่มีข้อมูล</td></tr>"; return; }

        const items = Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => b.timestamp - a.timestamp);

        tbody.innerHTML = items.map(item => {
            const sub = SUBJECT_MAP[item.subject] || { name: item.subject, color: 'slate' };
            const isVisible = item.isVisible !== false; // default เป็น true
            const hasPassed = !item.releaseTime || item.releaseTime <= Date.now();

            return `
            <tr class="hover:bg-slate-50/50 ${!isVisible ? 'opacity-50' : ''}">
                <td class="p-4">
                    <span class="bg-${sub.color}-100 text-${sub.color}-600 text-[10px] font-black px-2 py-1 rounded-lg uppercase">${sub.name}</span>
                </td>
                <td class="p-4">
                    <p class="font-bold text-slate-700 text-sm">${item.title}</p>
                    <div class="flex items-center gap-2 mt-1">
                        ${item.releaseTime ? `<span class="text-[9px] font-bold text-orange-500">⏰ ${new Date(item.releaseTime).toLocaleString('th-TH')}</span>` : '<span class="text-[9px] text-emerald-500 font-bold">✅ ปล่อยทันที</span>'}
                        ${!hasPassed ? `<button onclick="releaseNow('${item.id}')" class="text-[9px] bg-orange-100 text-orange-600 px-1.5 rounded hover:bg-orange-600 hover:text-white">ปล่อยตอนนี้เลย</button>` : ''}
                    </div>
                </td>
                <td class="p-4">
                    <button onclick="toggleVisibility('${item.id}', ${isVisible})" class="flex items-center gap-1 ${isVisible ? 'text-emerald-600' : 'text-slate-400'} font-bold text-xs">
                        ${isVisible ? '👁️ แสดงอยู่' : '🙈 ซ่อนจากน้อง'}
                    </button>
                </td>
                <td class="p-4 text-right">
                    <div class="flex justify-end gap-1">
                        <button onclick="editMaterial('${item.id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg">✏️</button>
                        <button onclick="deleteMaterial('${item.id}')" class="p-2 text-red-400 hover:bg-red-50 rounded-lg">🗑️</button>
                    </div>
                </td>
            </tr>
        `;
        }).join('');
    });


    window.editMaterial = async function (key) {
        const snapshot = await get(ref(db, `learning_materials/${key}`));
        const data = snapshot.val();
        if (!data) return;

        editingKey = key;
        document.getElementById('file-title').value = data.title;
        document.getElementById('file-subject').value = data.subject;
        document.getElementById('file-url').value = data.driveUrl;
        if (data.releaseTime) {
            const d = new Date(data.releaseTime);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            document.getElementById('release-time').value = d.toISOString().slice(0, 16);
        }

        document.getElementById('form-title').innerText = "แก้ไขเอกสาร";
        document.getElementById('btn-submit').innerText = "อัปเดตข้อมูล";
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
        document.getElementById('admin-form-container').scrollIntoView({ behavior: 'smooth' });
    };

    window.resetMaterialForm = function () {
        editingKey = null;
        document.getElementById('file-title').value = "";
        document.getElementById('file-url').value = "";
        document.getElementById('release-time').value = "";
        document.getElementById('form-title').innerText = "เพิ่มเอกสารใหม่";
        document.getElementById('btn-submit').innerText = "บันทึกลงฐานข้อมูล";
        document.getElementById('btn-cancel-edit').classList.add('hidden');
    };

    window.releaseNow = async function (key) {
        await update(ref(db, `learning_materials/${key}`), { releaseTime: 0 });
        // ส่งไป Sheets ด้วย
        fetch(CONFIG.appscriptUrl, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "updateMaterialStatus", key: CONFIG.syncKey, id: key, releaseTime: 0 })
        });
        showToast("ปล่อยไฟล์เรียบร้อย");
    };

    window.toggleVisibility = async function (key, currentStatus) {
        const newStatus = !currentStatus;
        await update(ref(db, `learning_materials/${key}`), { isVisible: newStatus });
        // ส่งไป Sheets
        fetch(CONFIG.appscriptUrl, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "updateMaterialStatus", key: CONFIG.syncKey, id: key, status: newStatus ? "active" : "hidden" })
        });
    };

    // แก้ไขฟังก์ชัน saveMaterial เดิมให้รองรับ Update
    window.saveMaterial = async function () {
        const title = document.getElementById('file-title').value.trim();
        const subject = document.getElementById('file-subject').value;
        const rawUrl = document.getElementById('file-url').value.trim();
        const releaseTimeVal = document.getElementById('release-time').value;
        const releaseTime = releaseTimeVal ? new Date(releaseTimeVal).getTime() : 0;

        if (!title || !rawUrl) return Swal.fire("กรุณากรอกข้อมูลให้ครบ", "", "error");

        const data = {
            title, subject,
            driveUrl: formatDriveUrl(rawUrl),
            releaseTime,
            uploadedBy: user.nickname,
            timestamp: Date.now(),
            isVisible: true
        };

        if (editingKey) {
            await update(ref(db, `learning_materials/${editingKey}`), data);
            data.action = "editMaterial";
            data.oldTitle = title; // ใช้หาแถวใน Sheet
        } else {
            await push(ref(db, 'learning_materials'), data);
            data.action = "addMaterial";
        }

        fetch(CONFIG.appscriptUrl, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ ...data, key: CONFIG.syncKey })
        });

        Swal.fire("บันทึกสำเร็จ", "", "success");
        resetMaterialForm();
    };
        window.deleteMaterial = async function (key) {
            const confirm = await Swal.fire({
                title: "ลบเอกสารนี้?",
                text: "น้องๆ จะไม่สามารถดาวน์โหลดไฟล์นี้ได้อีก",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if (confirm.isConfirmed) {
                try {
                    await remove(ref(db, `learning_materials/${key}`));
                    Swal.fire('ลบแล้ว!', '', 'success');
                } catch (e) {
                    Swal.fire('ผิดพลาด', e.message, 'error');
                }
            }
        }
    </script>
</body>

</html>
