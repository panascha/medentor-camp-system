<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดห้องเรียน - Admin Only</title>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        .room-column {
            min-height: 300px;
        }

        .ghost-card {
            opacity: 0.4;
            background: #e0e7ff;
            border: 2px dashed #4f46e5;
        }

        .student-card {
        transition: all 0.2s ease;
        cursor: grab;
    }
    .student-card:hover {
        transform: translateY(-2px) scale(1.02);
        background-color: #f8fafc; /* slate-50 */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        z-index: 10;
    }
    .student-card:active {
        cursor: grabbing;
    }

    /* สีประจำบ้าน (Border Left) */
    .house-1 { border-left: 6px solid #ef4444; } /* Red */
    .house-2 { border-left: 6px solid #3b82f6; } /* Blue */
    .house-3 { border-left: 6px solid #10b981; } /* Green */
    .house-4 { border-left: 6px solid #f59e0b; } /* Yellow */
    .house-5 { border-left: 6px solid #8b5cf6; } /* Purple */
    .house-6 { border-left: 6px solid #ec4899; } /* Pink */
    .house-7 { border-left: 6px solid #6366f1; } /* Indigo */
    .house-8 { border-left: 6px solid #14b8a6; } /* Teal */
    
    .swal2-popup {
        padding: 1.5rem !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
    }

    /* เอฟเฟกต์เมื่อ hover บนปุ่มในกล่องเลือก */
    .swal2-html-container button:active {
        transform: scale(0.95);
    }

    /* ปรับขนาดตัวอักษรของ SweetAlert Title */
    .swal2-title {
        font-size: 1.25rem !important;
        padding-top: 0.5rem !important;
    }

    .swal2-html-container button[class*="bg-green-50"] {
        box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.2);
    }
    
    /* เอฟเฟกต์ปุ่มย้าย (Hover) */
    .swal2-html-container button:not([class*="cursor-default"]):hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
    }

</style>
</head>

<body class="bg-slate-100 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="bg-white p-4 shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="../index.html"
                    class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1 font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                            clip-rule="evenodd" />
                    </svg>
                    กลับหน้าหลัก
                </a>
                <div class="h-6 w-[1px] bg-slate-200"></div>
                <h1 class="text-xl font-bold text-slate-800">ระบบจัดห้องเรียน (Admin)</h1>
            </div>
            <button onclick="saveSorting()" id="btn-save-all"
                class="bg-green-600 text-white px-8 py-2 rounded-full font-bold shadow-lg shadow-green-200 hover:bg-green-700 hover:-translate-y-0.5 transition-all">
                บันทึกลงฐานข้อมูล
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Controls Section -->
        <div
            class="bg-white p-6 rounded-3xl shadow-sm mb-8 flex flex-col md:flex-row gap-6 items-end border border-slate-200">
        <div class="w-full md:w-48">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">จำนวนห้องเรียน (Fixed)</label>
            <div class="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-center font-bold text-lg text-slate-600">
                4 ห้องเรียน
                <!-- เก็บค่าไว้ใน hidden เพื่อให้ JS ตัวเดิมดึงไปใช้ได้ -->
                <input type="hidden" id="room-count" value="4">
            </div>
        </div>

            <div class="flex-1 flex gap-3 w-full">
                <button onclick="applySnakeSort()"
                    class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    จัดแบบ Snake Sort (คละเก่ง)
                </button>
                <button onclick="resetToPool()"
                    class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all">ล้างทั้งหมด</button>
            </div>

            <div class="hidden lg:block text-right">
                <p class="text-xs text-slate-400 font-bold uppercase italic">* Sorting Logic:</p>
                <p class="text-xs text-slate-400 italic">กระจายคะแนน Pretest แบบสลับฟันปลา</p>
            </div>
        </div>

        <!-- รายชื่อนักเรียนทั้งหมด (Pool Area) -->
        <div id="pool-section" class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4 border-b pb-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">รายชื่อนักเรียน (Student Pool)</h2>
                    <p class="text-xs text-slate-400">ลากรายชื่อจากที่นี่ไปใส่ในห้องเรียน หรือกดสุ่มคนที่เหลือ</p>
                </div>
                <div class="flex flex-wrap gap-2 items-center">
                    <!-- Filter House -->
                    <select id="filter-house" onchange="renderPool()"
                        class="p-2 border-2 border-slate-100 rounded-xl text-sm font-bold outline-none focus:border-blue-500">
                        <option value="all">ทุกบ้าน</option>
                        <option value="1">บ้าน 1</option>
                        <option value="2">บ้าน 2</option>
                        <option value="3">บ้าน 3</option>
                        <option value="4">บ้าน 4</option>
                        <option value="5">บ้าน 5</option>
                        <option value="6">บ้าน 6</option>
                        <option value="7">บ้าน 7</option>
                        <option value="8">บ้าน 8</option>
                    </select>
                    <!-- Sort Buttons -->
                    <button onclick="sortPool('desc')"
                        class="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-[10px] font-bold transition-colors">คะแนนมาก
                        ➔ น้อย</button>
                    <button onclick="sortPool('asc')"
                        class="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-[10px] font-bold transition-colors">คะแนนน้อย
                        ➔ มาก</button>
                    <!-- Random Button -->
                    <button onclick="distributeRemaining()"
                        class="p-2 px-4 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-[10px] font-bold shadow-lg shadow-orange-100 transition-all">
                        🎲 สุ่มคนที่เหลือเข้าห้อง
                    </button>
                </div>
            </div>
        
            <!-- Student Pool Container -->
            <div id="pool"
                class="room-column flex flex-wrap gap-2 p-4 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-200 min-h-[120px]"
                data-room="pool">
                <!-- รายชื่อนักเรียนจะถูกโหลดที่นี่ -->
            </div>
        </div>

        <!-- Rooms Grid -->
        <div id="rooms-wrapper" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <!-- Rooms generated by JS -->
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script src="../js/sorting-logic.js"></script>

</body>

</html>
