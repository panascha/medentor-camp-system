<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <div class="text-center">
                <h1 class="text-lg font-black text-slate-800 leading-none">CLASSROOM ACTIVITY</h1>
                <p id="room-badge" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">
                    Connecting...</p>
            </div>
            <div class="w-10"></div> <!-- Placeholder for balance -->
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- [UI State 1] Select Subject -->
        <div id="subject-selector"
            class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 text-center space-y-6">
            <!-- เนื้อหาจะถูกเติมโดย renderWaitingRoom ใน JS -->
            <div class="py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-400 animate-pulse">กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
        </div>

        <!-- [UI State 2] Live Activity Area -->
        <div id="activity-area" class="hidden space-y-6 animate-fade-in">

            <!-- Broadcast Card -->
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden text-white">
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-4">
                        <span id="status-dot" class="flex h-3 w-3 rounded-full bg-slate-500"></span>
                        <span id="status-text"
                            class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Waiting for
                            Tutor</span>
                    </div>
                    <h2 id="display-q-title" class="text-2xl font-black leading-tight italic">กรุณารอสักครู่
                        พี่ติวเตอร์กำลังเตรียมคำถาม...</h2>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
            </div>

            <!-- Response Form -->
            <div id="response-form"
                class="hidden bg-white p-6 rounded-[2.5rem] shadow-lg border border-slate-100 space-y-4">
                <div>
                    <label
                        class="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-widest">คำตอบของคุณ</label>
                    <textarea id="input-answer" rows="3" placeholder="พิมพ์คำตอบที่นี่..."
                        class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all text-lg font-medium"></textarea>
                </div>

                <label
                    class="flex items-center gap-3 p-4 bg-yellow-50 rounded-2xl border border-yellow-100 cursor-pointer active:scale-95 transition-transform">
                    <input type="checkbox" id="check-talk" class="w-5 h-5 accent-yellow-500">
                    <span class="text-sm font-bold text-yellow-700">ต้องการแสดงความเห็น / อธิบาย (Hand Up) 🙋‍♂️</span>
                </label>

                <button onclick="submitResponse()"
                    class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                    ส่งคำตอบตอนนี้
                </button>
            </div>

            <!-- Empty/Closed State -->
            <div id="closed-state"
                class="bg-white p-10 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center">
                <p class="text-slate-400 font-bold italic">ขณะนี้ยังไม่เปิดรับคำตอบ<br>กรุณารอพี่ติวเตอร์เปิดระบบ...</p>
            </div>

        </div>

    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"
            }
        }
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/classroom-logic.js"></script>
</body>

</html>
