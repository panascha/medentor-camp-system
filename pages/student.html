<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- Navigation -->
        <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <!-- ปุ่มกลับหน้าหลัก -->
                <a href="../index.html"
                    class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-600 flex items-center gap-1 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:-translate-x-1 transition-transform"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span class="text-xs font-bold hidden sm:block">หน้าหลัก</span>
                </a>
        
                <div class="text-center">
                    <h1 class="text-lg font-black text-slate-800 leading-none">CLASSROOM</h1>
                    <p id="room-badge" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">Connecting...
                    </p>
                </div>
        
                <!-- ปุ่มคำถามส่วนตัว -->
                <button onclick="askPrivateQuestion()" class="p-2 hover:bg-slate-100 rounded-full text-orange-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </button>
            </div>
        </nav>

        <!-- [UI State 1] Select Subject -->
        <div id="subject-selector"
            class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 text-center space-y-6">
            <!-- เนื้อหาจะถูกเติมโดย renderWaitingRoom ใน JS -->
            <div class="py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-400 animate-pulse">กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
        </div>

        <!-- [UI State 2] Live Activity Area -->
        <div id="activity-area" class="hidden space-y-6 animate-fade-in">

            <!-- Broadcast Card -->
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden text-white">
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-4">
                        <span id="status-dot" class="flex h-3 w-3 rounded-full bg-slate-500"></span>
                        <span id="status-text"
                            class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Waiting for
                            Tutor</span>
                    </div>
                    <h2 id="display-q-title" class="text-2xl font-black leading-tight italic">กรุณารอสักครู่
                        พี่ติวเตอร์กำลังเตรียมคำถาม...</h2>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
            </div>

            <!-- Response Form -->
            <div id="response-form"
                class="hidden bg-white p-6 rounded-[2.5rem] shadow-lg border border-slate-100 space-y-4">
                <div>
                    <label
                        class="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-widest">คำตอบของคุณ</label>
                    <textarea id="input-answer" rows="3" placeholder="พิมพ์คำตอบที่นี่..."
                        class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all text-lg font-medium"></textarea>
                </div>

                <label
                    class="flex items-center gap-3 p-4 bg-yellow-50 rounded-2xl border border-yellow-100 cursor-pointer active:scale-95 transition-transform">
                    <input type="checkbox" id="check-talk" class="w-5 h-5 accent-yellow-500">
                    <span class="text-sm font-bold text-yellow-700">ต้องการแสดงความเห็น / อธิบาย (Hand Up) 🙋‍♂️</span>
                </label>

                <button onclick="submitResponse()"
                    class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                    ส่งคำตอบตอนนี้
                </button>
            </div>

            <!-- Empty/Closed State -->
            <div id="closed-state"
                class="bg-white p-10 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center">
                <p class="text-slate-400 font-bold italic">ขณะนี้ยังไม่เปิดรับคำตอบ<br>กรุณารอพี่ติวเตอร์เปิดระบบ...</p>
            </div>

        </div>
        
        <!-- Floating Interaction Bar (Reaction & SOS) -->
        <div id="interaction-bar"
            class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 bg-white/80 backdrop-blur-md p-2 rounded-full shadow-2xl border border-white/50">
            <button onclick="sendReaction('👏')"
                class="w-10 h-10 flex items-center justify-center hover:scale-125 transition-transform text-xl">👏</button>
            <button onclick="sendReaction('❤️')"
                class="w-10 h-10 flex items-center justify-center hover:scale-125 transition-transform text-xl">❤️</button>
            <button onclick="sendReaction('💡')"
                class="w-10 h-10 flex items-center justify-center hover:scale-125 transition-transform text-xl">💡</button>
            <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
            <button onclick="sendSOS()"
                class="bg-red-50 text-red-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-tighter hover:bg-red-600 hover:text-white transition-all">
                ตามไม่ทัน 🐢
            </button>
        </div>

    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"
            }
        }
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/classroom-logic.js"></script>
    <script type="module">
        // นำเข้า Firebase Functions ที่จำเป็น
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, set, push, runTransaction, onValue, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // 1. Initialize Firebase ภายใน Script นี้ด้วยเพื่อให้มีตัวแปร db ใช้งาน
        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);

        // 2. ดึงข้อมูล User และ Room (ต้องเหมือนกับใน classroom-logic.js)
        let userSession = checkAuth();
        let myId = userSession?.id;   
        let myRoom = userSession?.classID ? `Room_${userSession.classID}` : null; // เปลี่ยนเป็น let
        let mySOSStatus = false;

        // ตัวแปรเก็บข้อมูล Session ปัจจุบัน (สำหรับ Subject)
        let activeSessionData = null;

        // 3. ตรวจสอบสถานะการ Login และดึงข้อมูลห้องเรียน
        if (myId) {
                const roomBadge = document.getElementById('room-badge');
                const savedJoinedRoom = localStorage.getItem('joined_room');

                const studentRef = ref(db, `students/${myId}`);
                onValue(studentRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.classID) {
                        myRoom = `Room_${data.classID}`;

                        // ตรวจสอบว่าห้องที่ Admin จัดให้ ตรงกับห้องที่เคย Join ไว้หรือไม่
                        if (savedJoinedRoom === myRoom) {
                            // ถ้าเคย Join ไว้แล้ว ให้ข้ามไปหน้าเรียนเลย
                            window.isInClass = true;
                            document.getElementById('subject-selector').classList.add('hidden');
                            document.getElementById('activity-area').classList.remove('hidden');
                            // เรียกใช้ Listener คำถาม
                            if (typeof window.initStudentListener === 'function') {
                                window.initStudentListener();
                            }
                        }

                        startWatchingActiveSession();
                    }
                });
            }
        // ฟังข้อมูลห้องเพื่ออัปเดต activeSessionData
        if (myRoom) {
            onValue(ref(db, `active_sessions/${myRoom}`), (snapshot) => {
                activeSessionData = snapshot.val();
            });
        }

        // --- [ฟังก์ชันที่เคย Error: ตอนนี้ db และ myRoom จะใช้งานได้แล้ว] ---

        window.sendReaction = function (emoji) {
            if (!myRoom) return;
            set(ref(db, `active_sessions/${myRoom}/last_reaction`), {
                type: emoji,
                ts: Date.now()
            });
        };

    window.sendSOS = function () {
            if (!myRoom || !userSession) return;

            const sosBtn = document.querySelector('[onclick="sendSOS()"]'); // อ้างอิงปุ่ม
            mySOSStatus = !mySOSStatus; // สลับสถานะ (Toggle)

            // บันทึกลง Firebase โดยใช้ ID ของน้องเป็น Key
            // ถ้าเป็น true จะบันทึกค่าลงไป ถ้าเป็น false จะลบ (set null)
            const mySOSRef = ref(db, `active_sessions/${myRoom}/sos_students/${userSession.id}`);
            set(mySOSRef, mySOSStatus ? { nickname: userSession.nickname, ts: Date.now() } : null);

            // --- อัปเดต UI ของปุ่มทันที ---
            if (mySOSStatus) {
                sosBtn.innerText = "ตามทันแล้ว ✨";
                sosBtn.classList.remove('bg-red-50', 'text-red-600');
                sosBtn.classList.add('bg-green-600', 'text-white');
                showToast("ส่งสัญญาณว่าไม่ทันแล้ว 🐢", "info");
            } else {
                sosBtn.innerText = "ตามไม่ทัน 🐢";
                sosBtn.classList.remove('bg-green-600', 'text-white');
                sosBtn.classList.add('bg-red-50', 'text-red-600');
                showToast("เย้! ตามทันแล้ว", "success");
            }
        };

        // --- เพิ่มเติม: ดักฟังเมื่อจบวิชา ให้ Reset ปุ่มเป็นสถานะปกติ ---
        onValue(ref(db, `active_sessions/${myRoom}`), (snapshot) => {
            if (!snapshot.exists()) {
                mySOSStatus = false;
                const sosBtn = document.querySelector('[onclick="sendSOS()"]');
                if (sosBtn) {
                    sosBtn.innerText = "ตามไม่ทัน 🐢";
                    sosBtn.className = "bg-red-50 text-red-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-tighter hover:bg-red-600 hover:text-white transition-all";
                }
            }
        });
        
        window.askPrivateQuestion = async function () {
            if (!myRoom) return;
            const { value: text } = await Swal.fire({
                title: 'ถามสิ่งที่สงสัยเพิ่มเติม',
                input: 'textarea',
                inputPlaceholder: 'พิมพ์คำถามที่สงสัยทิ้งไว้ที่นี่...',
                showCancelButton: true,
                confirmButtonText: 'ส่งคำถาม',
                cancelButtonText: 'ยกเลิก',
            });

            if (text) {
                const questionData = {
                    room: myRoom,
                    subject: activeSessionData?.subject || 'general',
                    studentName: `${userSession.nickname} (${userSession.id})`,
                    question: text,
                    ts: Date.now()
                };
                push(ref(db, `private_questions/${myRoom}`), questionData);

                fetch(CONFIG.appscriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "submitPrivateQuestion", key: CONFIG.syncKey, ...questionData })
                });
                Swal.fire('ส่งสำเร็จ!', 'พี่สตาฟได้รับคำถามแล้วครับ', 'success');
            }
        };

        window.viewMyHistory = async function () {
            if (!myRoom) return;
            Swal.fire({ title: 'กำลังโหลดประวัติ...', didOpen: () => Swal.showLoading() });

            try {
                const snapshot = await get(ref(db, `responses/${myRoom}`));
                const allRes = snapshot.val() || {};
                const myHistory = Object.values(allRes).filter(res => res.studentID === userSession.id);

                if (myHistory.length === 0) return Swal.fire("ไม่พบประวัติ", "น้องยังไม่เคยส่งคำตอบในคาบนี้", "info");

                const html = myHistory.reverse().map(h => `
                    <div class="text-left p-3 mb-2 rounded-xl border bg-slate-50">
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${new Date(h.timestamp).toLocaleTimeString()}</p>
                        <p class="text-sm text-slate-700">${h.answer}</p>
                    </div>
                `).join('');

                Swal.fire({
                    title: 'ประวัติการตอบของฉัน',
                    html: `<div class="max-h-60 overflow-y-auto pr-2">${html}</div>`,
                    confirmButtonText: 'ปิด'
                });
            } catch (e) {
                Swal.fire("Error", "ไม่สามารถดึงข้อมูลได้", "error");
            }
        };

        // ระบบ Rating (เหมือนเดิมแต่ย้ายมาไว้ในขอบเขตที่มี db)
        let hasRatedThisSession = false;
        let lastSubjectForRating = "";
        let lastActiveSubject = "";
        let lastTutorName = "ไม่ระบุชื่อ";


        // ค้นหาโค้ดส่วนนี้ในหน้า student.html แล้วแก้เป็นแบบนี้
            if (myRoom) {
                onValue(ref(db, `active_sessions/${myRoom}`), (snapshot) => {
                    const session = snapshot.val();
                    const interactionBar = document.getElementById('interaction-bar');

                    if (session && session.isOpen) {
                        // เพิ่ม IF เช็ค interactionBar
                        if (interactionBar) interactionBar.classList.remove('hidden');

                        lastTutorName = session.tutor || "ไม่ระบุชื่อ";
                        lastSubjectForRating = session.subject;
                        hasRatedThisSession = false;
                    } else {
                        // เพิ่ม IF เช็ค interactionBar ตรงนี้ด้วย
                        if (interactionBar) interactionBar.classList.add('hidden');

                        if (!hasRatedThisSession && lastSubjectForRating !== "" && window.isInClass) {
                            triggerRating(lastSubjectForRating);
                        }
                    }
                });
            }
        function startWatchingActiveSession() {
                if (!myRoom) return;

                onValue(ref(db, `active_sessions/${myRoom}`), (snapshot) => {
                    const session = snapshot.val();
                    const roomBadge = document.getElementById('room-badge');
                    const interactionBar = document.getElementById('interaction-bar');

                    if (session && session.isOpen) {
                        // เช็คก่อนว่ามี element roomBadge ไหม
                        if (roomBadge) {
                            roomBadge.innerText = `${myRoom.replace('_', ' ')} | ${session.subject.toUpperCase()}`;
                        }

                        // เช็คก่อนว่ามี element interactionBar ไหม
                        if (window.isInClass && interactionBar) {
                            interactionBar.classList.remove('hidden');
                        }

                        window.lastActiveSubject = session.subject;
                    } else {
                        if (roomBadge) {
                            roomBadge.innerText = `${myRoom.replace('_', ' ')} | CLOSED`;
                        }

                        // เพิ่ม IF เช็คตรงนี้เพื่อป้องกัน Error
                        if (interactionBar) {
                            interactionBar.classList.add('hidden');
                        }

                        if (window.isInClass && !hasRatedThisSession && window.lastActiveSubject) {
                            triggerRating(window.lastActiveSubject);
                        }
                    }
                });
            }
            async function triggerRating(subject) {
            // ป้องกันการเรียกซ้อน
            if (hasRatedThisSession) return;
            hasRatedThisSession = true;

            const tutorName = lastTutorName;
        
            const { value: formValues } = await Swal.fire({
                title: 'การสอนในคาบเรียนนี้เป็นยังไงบ้าง?',
                html: `
            <p class="text-xs text-slate-500 mb-4">วิชา ${subject.toUpperCase()} | พี่${tutorName}</p>
            <div class="flex flex-col gap-4">
                <select id="swal-rating" class="p-3 border rounded-xl font-bold">
                    <option value="5">⭐⭐⭐⭐⭐ (ดีมาก)</option>
                    <option value="4">⭐⭐⭐⭐ (ดี)</option>
                    <option value="3">⭐⭐⭐ (ปานกลาง)</option>
                    <option value="2">⭐⭐ (พอใช้)</option>
                    <option value="1">⭐ (ควรปรับปรุง)</option>
                </select>
                <textarea id="swal-comment" class="p-3 border rounded-xl text-sm" placeholder="ข้อเสนอแนะเพิ่มเติม (ถ้ามี)"></textarea>
            </div>
        `,
                confirmButtonText: 'ส่งความเห็น',
                allowOutsideClick: false,
                preConfirm: () => {
                    return {
                        rating: document.getElementById('swal-rating').value,
                        comment: document.getElementById('swal-comment').value
                    }
                }
            });

            if (formValues) {
                // ส่งข้อมูลไปยัง Google Apps Script
                fetch(CONFIG.appscriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: "submitRating",
                        key: CONFIG.syncKey,
                        room: myRoom,
                        subject: subject,
                        tutor: tutorName,
                        rating: formValues.rating,
                        comment: formValues.comment
                    })
                });

                await Swal.fire('ขอบคุณสำหรับความคิดเห็นครับ!', 'success');

                // ล้างสถานะเข้าเรียนหลังจากประเมินเสร็จ
                window.isInClass = false;
                window.lastActiveSubject = "";
                localStorage.removeItem('joined_room');

                // รีเฟรชหน้าจอเพื่อกลับไปหน้าเลือกห้อง
                location.reload();
            }
        }

        </script>
</body>

</html>
