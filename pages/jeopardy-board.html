<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEOPARDY BOARD - Medentor Camp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* เพิ่มฟอนต์ Sarabun และสไตล์พื้นฐาน */
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
    
        /* Kahoot-Style Options Grid */
        .kahoot-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* แบ่ง 2 คอลัมน์ */
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
            margin-top: 2rem;
            perspective: 1000px;
        }
    
        .kahoot-option {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-size: 2.2rem;
            /* ขนาดตัวอักษรใหญ่พิเศษ */
            font-weight: 800;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
            opacity: 0;
            /* ซ่อนไว้ก่อนจนกว่า Admin จะสั่งโชว์ */
            transform: translateY(30px) rotateX(-15deg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    
        /* เมื่อ Admin สั่ง Reveal */
        .revealed .kahoot-option {
            opacity: 1;
            transform: translateY(0) rotateX(0);
        }
    
        /* สัญลักษณ์และสีประจำข้อ */
        .opt-0 {
            background-color: #e21b3c;
        }
    
        /* สีแดง - สามเหลี่ยม */
        .opt-1 {
            background-color: #1368ce;
        }
    
        /* สีน้ำเงิน - ขนมเปียกปูน */
        .opt-2 {
            background-color: #d89e00;
        }
    
        /* สีเหลือง - วงกลม */
        .opt-3 {
            background-color: #26890c;
        }
    
        /* สีเขียว - สี่เหลี่ยม */
    
        .kahoot-symbol {
            font-size: 2.5rem;
            margin-right: 1.5rem;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.2));
            min-width: 50px;
            text-align: center;
        }
    
        /* ปรับแต่ง Question Text ให้เด่น */
        #overlay-text {
            font-size: 4rem;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 1);
        }
    
        /* ส่วน Scoreboard ด้านข้าง (Slim เหมือนเดิม) */
        #scoreboard {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            gap: 6px;
        }
    
        .house-card-compact {
            flex: 1;
            min-height: 50px;
            padding: 0 0.75rem !important;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
        }
    </style>
</head>

<body class="h-screen flex flex-col p-6">

    <!-- Header Area -->
    <header class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex items-center gap-4">
            <img src="../assets/logo.png" class="h-10 w-10 object-contain">
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 uppercase leading-none">Jeopardy <span
                        class="text-blue-600 italic">Challenge</span></h1>
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-1">Medentor Camp 13th System</p>
            </div>
        </div>
    
        <div class="flex gap-2">
            <div class="text-center px-4 py-1 bg-slate-50 rounded-xl border border-slate-100">
                <p class="text-[8px] font-black text-slate-400 uppercase">Round</p>
                <p id="display-round" class="text-xl font-black text-slate-700 leading-none">1</p>
            </div>
            <div id="active-house-display-box"
                class="text-center px-6 py-1 bg-blue-600 rounded-xl shadow-md border-2 border-blue-400">
                <p class="text-[8px] font-black text-blue-100 uppercase">Choosing Now</p>
                <p class="text-xl font-black text-white leading-none">บ้าน <span id="display-active-house">-</span></p>
            </div>
        </div>
    </header>

    <div class="flex-1 grid grid-cols-12 gap-6 overflow-hidden main-game-area">
        <!-- Main Board -->
        <main class="col-span-9 bg-white rounded-[2.5rem] border border-slate-200 p-6 shadow-sm flex flex-col">
            <div id="board-container" class="grid grid-cols-5 gap-3 h-full">
                <!-- Questions -->
            </div>
        </main>
    
        <!-- Scoreboard Sidebar -->
        <aside class="col-span-3 p-6" id="scoreboard">
            <!-- JS will render 8 houses here -->
        </aside>
    </div>

    <!-- Question Overlay -->
    <div id="question-overlay"
        class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-md flex items-center justify-center p-10">
        <div class="max-w-5xl w-full h-full flex flex-col animate-pop">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <span id="overlay-category"
                        class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full font-black uppercase text-xs tracking-widest border border-blue-200">CATEGORY</span>
                    <h2 id="overlay-points" class="mt-4 text-6xl font-black text-slate-800">0 <span
                            class="text-2xl text-slate-400">PTS</span></h2>
                </div>
                <div class="text-right">
                    <p class="text-xs font-black text-slate-400 uppercase mb-1">Time Remaining</p>
                    <p id="overlay-timer" class="text-8xl font-black tabular-nums text-slate-800">00:00</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center items-center text-center px-10">
                <h3 id="overlay-text" class="text-5xl md:text-6xl font-black leading-tight text-slate-800">
                    ...คำถาม...</h3>

                <div id="overlay-options" class="grid grid-cols-2 gap-4 w-full mt-12 hidden">
                    <!-- Options buttons -->
                </div>
            </div>

            <div
                class="mt-10 p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
                        ผู้ได้รับสิทธิ์ตอบขณะนี้</p>
                    <div class="flex items-center gap-4">
                        <div id="answering-house-badge"
                            class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl font-black shadow-lg">
                            ?</div>
                        <p class="text-3xl font-black text-slate-800 uppercase">บ้าน <span
                                id="display-answering-house">-</span></p>
                    </div>
                </div>
                <div id="steal-indicator"
                    class="hidden animate-pulse flex items-center gap-3 bg-orange-100 text-orange-600 px-6 py-3 rounded-2xl border border-orange-200">
                    <span class="text-2xl">🚨</span>
                    <span class="font-black">เปิดระบบ STEAL แล้ว!</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js" }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";
        window.isBoardPage = true; 
    </script>
    <script type="module" src="../js/jeopardy-logic.js"></script>
</body>

</html>
