<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังไฟล์เรียน - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .active-filter {
            background-color: #1e293b !important;
            color: white !important;
            border-color: #1e293b !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white p-4 border-b sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="text-blue-600 font-bold flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                        clip-rule="evenodd" />
                </svg>
                หน้าหลัก
            </a>
            <h1 class="text-lg font-black uppercase italic text-slate-800">Learning Materials</h1>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-6 pb-20">
        <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-2xl font-black">คลังไฟล์เรียน</h2>
                <p class="text-xs opacity-80 mt-1">ดาวน์โหลดเอกสารประกอบการเรียนและชีทสรุปจากพี่สตาฟ</p>
            </div>
            <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full blur-2xl"></div>
        </div>

        <div
            class="bg-amber-50 border-2 border-amber-200 p-6 rounded-[2.5rem] shadow-sm flex flex-col md:flex-row items-center gap-4 animate-fade-in">
            <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-3xl shrink-0">
                📚
            </div>
            <div class="flex-1 text-center md:text-left">
                <span class="bg-amber-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">🚨
                    Urgent: Must Read</span>
                <h3 class="text-lg font-black text-slate-800 mt-2 leading-tight">Pre Reading Problem-based learning (PBL)</h3>
                <p class="text-slate-600 text-xs mt-1 font-medium">อ่านก่อนเข้าเรียนกิจกรรม Intro med วันที่ 30 เม.ย. ตอนเย็น naja</p>
            </div>
            <a href="https://drive.google.com/file/d/15E5wfLAs5uiR_n2iSTTUNRvABP5Vlipl/view?usp=sharing" target="_blank"
                class="w-full md:w-auto bg-amber-600 text-white px-8 py-3 rounded-xl font-black text-center shadow-lg shadow-amber-200 hover:bg-amber-700 transition-all active:scale-95">
                เปิดเอกสาร ➔
            </a>
        </div>

        <!-- หมวดหมู่ (Filter) -->
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="subject-filter">
            <button onclick="filterFiles('all', this)"
                class="filter-btn active-filter px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">ทั้งหมด</button>
            <button onclick="filterFiles('physic', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">ฟิสิกส์</button>
            <button onclick="filterFiles('chemistry', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">เคมี</button>
            <button onclick="filterFiles('biology', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">ชีววิทยา</button>
            <button onclick="filterFiles('introdent', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">IntroDent</button>
            <button onclick="filterFiles('intromed', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">IntroMed</button>
            <button onclick="filterFiles('general', this)"
                class="filter-btn px-6 py-2 rounded-full bg-white border border-slate-200 text-slate-600 text-xs font-bold transition-all">กิจกรรม/ทั่วไป</button>
        </div>

        <!-- รายการไฟล์ -->
        <div id="files-grid" class="space-y-4">
            <!-- Loading State -->
            <div class="py-20 text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-400 text-sm">กำลังโหลดคลังไฟล์...</p>
            </div>
        </div>
    </main>

    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js" }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";

        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);
        let allFiles = [];

        // ชื่อวิชาภาษาไทย
        const SUBJECT_NAME = {
            'physic': 'ฟิสิกส์',
            'chemistry': 'เคมี',
            'biology': 'ชีววิทยา',
            'introdent': 'Intro to Dent',
            'intromed': 'Intro to Med',
            'general': 'กิจกรรม/ทั่วไป'
        };

        // สีของวิชา
        const SUBJECT_COLOR = {
            'physic': 'blue',
            'chemistry': 'orange',
            'biology': 'emerald',
            'introdent': 'purple',
            'intromed': 'red',
            'general': 'slate'
        };

        onValue(ref(db, 'learning_materials'), (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('files-grid');

            if (!data) {
                grid.innerHTML = `
                    <div class="py-20 text-center">
                        <div class="text-5xl mb-4">📁</div>
                        <p class="text-slate-400 font-bold">ขณะนี้ยังไม่มีไฟล์ในคลังเอกสาร</p>
                    </div>`;
                return;
            }

            allFiles = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
            renderFiles('all');
        });

        window.filterFiles = function (subject, btn) {
            // สลับ Class ปุ่มที่ถูกกด
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');

            renderFiles(subject);
        }

        function renderFiles(filter) {
                const grid = document.getElementById('files-grid');
                const now = Date.now(); // เวลาปัจจุบัน

                // กรองตามวิชาเท่านั้น (ไม่กรองเวลาออก เพื่อให้แสดงไฟล์ที่ล็อคอยู่ด้วย)
            const displayData = allFiles.filter(f => {
                const matchSubject = (filter === 'all' || f.subject === filter);
                const isVisible = f.isVisible !== false; // กรองไฟล์ที่พี่สตาฟสั่งซ่อนออก
                return matchSubject && isVisible;
            });
                if (displayData.length === 0) {
                    grid.innerHTML = `<p class="text-center py-20 text-slate-400 italic">ยังไม่มีไฟล์ในหมวดหมู่นี้</p>`;
                    return;
                }

                grid.innerHTML = displayData.map(f => {
                    const color = SUBJECT_COLOR[f.subject] || 'slate';
                    const subjectName = SUBJECT_NAME[f.subject] || f.subject;

                    // ตรวจสอบว่าถึงเวลาปล่อยหรือยัง
                    const isReleased = !f.releaseTime || f.releaseTime <= now;

                    // จัดรูปแบบวันที่และเวลาที่จะปล่อย (เช่น 30 เม.ย. 14:00)
                    const releaseLabel = f.releaseTime ? new Date(f.releaseTime).toLocaleString('th-TH', {
                        day: 'numeric',
                        month: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    }) : '';

                    // ถ้าปล่อยแล้ว -> แสดงปุ่ม Download สีตามวิชา
                    // ถ้ายังไม่ปล่อย -> แสดงปุ่มสีเทา พร้อมไอคอนล็อคและเวลา
                    const actionButton = isReleased
                        ? `
            <a href="${f.driveUrl}" 
               target="_blank" 
               class="flex items-center gap-2 bg-white border-2 border-${color}-500 text-${color}-600 px-4 py-2 rounded-2xl text-[10px] font-black uppercase hover:bg-${color}-600 hover:text-white transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download
            </a>`
                        : `
            <div class="flex flex-col items-end gap-1">
                <div class="flex items-center gap-2 bg-slate-100 text-slate-400 px-4 py-2 rounded-2xl text-[10px] font-black uppercase cursor-not-allowed border border-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    Locked
                </div>
                <span class="text-[9px] font-bold text-orange-500 animate-pulse">เปิดให้โหลด: ${releaseLabel}</span>
            </div>`;

                    return `
        <div class="bg-white p-5 rounded-[2rem] border ${isReleased ? 'border-slate-100' : 'border-slate-200 bg-slate-50/50'} shadow-sm flex justify-between items-center group transition-all">
            <div class="flex items-center gap-4 ${!isReleased ? 'opacity-60' : ''}">
                <div class="w-12 h-12 ${isReleased ? `bg-${color}-50 text-${color}-600` : 'bg-slate-200 text-slate-400'} rounded-2xl flex items-center justify-center text-xl shadow-inner">
                    ${isReleased ? '📄' : '🔒'}
                </div>
                <div>
                    <span class="text-[9px] font-black ${isReleased ? `text-${color}-500` : 'text-slate-400'} uppercase tracking-widest">${subjectName}</span>
                    <h3 class="font-black text-slate-800 leading-tight">${f.title}</h3>
                </div>
            </div>
            ${actionButton}
        </div>
        `;
                }).join('');
            }
        </script>
</body>

</html>
