<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratings Dashboard - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="text-blue-600 font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path
                        d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" />
                </svg>
                กลับหน้าหลัก
            </a>
            <div class="text-right">
                <h1 class="text-lg font-black text-slate-800 uppercase italic leading-none">Ratings Dashboard</h1>
                <p id="view-mode-badge" class="text-[9px] font-bold text-blue-500 mt-1 uppercase tracking-widest">
                    Loading...</p>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <!-- Stats Header -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Average Rating</p>
                <div class="flex items-center justify-center gap-1">
                    <span id="stat-avg" class="text-4xl font-black text-blue-600">0.0</span>
                    <span class="text-slate-300 text-sm">/ 5.0</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Feedbacks</p>
                <span id="stat-count" class="text-4xl font-black text-slate-800">0</span>
            </div>
            <div class="md:col-span-2 bg-slate-800 p-6 rounded-[2rem] shadow-lg flex items-center justify-between">
                <div class="text-white">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ยินดีต้อนรับ</p>
                    <h2 id="user-display-name" class="text-xl font-black">กำลังโหลด...</h2>
                </div>
                <div id="admin-icon"
                    class="hidden w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-2xl">🛡️</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div
            class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="flex flex-col">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">เลือกคาบเรียน (Session)</label>
                <select id="filter-session" onchange="renderDashboard()"
                    class="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-sm outline-none border-2 border-transparent focus:border-blue-500">
                    <option value="all">ทุกคาบเรียน (All Sessions)</option>
                </select>
            </div>
            <div id="admin-only-tutor" class="hidden flex flex-col">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">ติวเตอร์ (Admin Only)</label>
                <select id="filter-tutor" onchange="renderDashboard()"
                    class="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-sm outline-none border-2 border-transparent focus:border-blue-500">
                    <option value="all">ทุกคน</option>
                </select>
            </div>
            <div id="admin-only-subject" class="hidden flex flex-col">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">กลุ่มวิชา (Admin Only)</label>
                <select id="filter-subject" onchange="renderDashboard()"
                    class="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-sm outline-none border-2 border-transparent focus:border-blue-500">
                    <option value="all">ทุกวิชา</option>
                </select>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">กำลังรวบรวมข้อมูล...</p>
        </div>

        <div id="feedback-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
    </main>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);

        let allRatings = [];
        const user = checkAuth();

        // ตารางแปลงเลขห้อง กลับเป็นชื่อกลุ่ม (Class)
        // อ้างอิงตาม index.html: Class A=3501, B=3502, C=3504, D=3505
        const ROOM_TO_CLASS_MAP = {
            '3501': 'CLASS A',
            '3502': 'CLASS B',
            '3504': 'CLASS C',
            '3505': 'CLASS D',
            'DT1': 'CLASS A',
            'DT2': 'CLASS B',
            'DT3': 'CLASS C',
            'DT4': 'CLASS D'
        };

        const DIV_TO_SUBJECT_MAP = {
            "ฟิสิกส์": "physic",
            "เคมี": "chemistry",
            "ชีววิทยา": "biology",
            "IntroDent": "introdent",
            "IntroMed": "intromed"
        };

        function formatRoomToClass(roomStr) {
            if (!roomStr) return 'COMMON';
            // ลบคำว่า (SCH) และตัดช่องว่าง
            const cleanRoom = roomStr.replace('(SCH)', '').trim();

            // 1. ถ้ามาในรูปแบบ Room_A ตรงๆ
            const matchRoom = cleanRoom.match(/Room_([A-D])/i);
            if (matchRoom) return `CLASS ${matchRoom[1].toUpperCase()}`;

            // 2. ถ้ามาในรูปแบบเลขห้อง 3501, 3502...
            if (ROOM_TO_CLASS_MAP[cleanRoom]) {
                return ROOM_TO_CLASS_MAP[cleanRoom];
            }

            return cleanRoom; // กรณีไม่เข้าเงื่อนไข ให้คืนค่าเดิม
        }

        function init() {
            if (!user || user.userType !== 'staff') {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-display-name').innerText = user.nickname || user.fullName;

            if (user.role === 'Admin') {
                document.getElementById('admin-only-tutor').classList.remove('hidden');
                document.getElementById('admin-only-subject').classList.remove('hidden');
                document.getElementById('admin-icon').classList.remove('hidden');
                document.getElementById('view-mode-badge').innerText = "Admin: Full Access";
            } else {
                document.getElementById('view-mode-badge').innerText = `Division: ${user.division}`;
            }

            const ratingsRef = ref(db, 'ratings');
            onValue(ratingsRef, (snapshot) => {
                const data = snapshot.val();
                document.getElementById('loading-state').classList.add('hidden');

                if (!data) {
                    allRatings = [];
                    renderDashboard();
                    return;
                }

                allRatings = Object.keys(data).map(key => data[key]);
                allRatings.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                setupDynamicFilters();
                renderDashboard();
            });
        }

        let filtersInitialized = false;
            function setupDynamicFilters() {
                if (filtersInitialized) return;

                const sessionSelect = document.getElementById('filter-session');
                const mySubjectKey = DIV_TO_SUBJECT_MAP[user.division];

                let filteredForDropdown = allRatings;

                // --- ส่วนที่ปรับปรุง: กรองข้อมูลที่จะมาแสดงใน Dropdown ---
                // ถ้าไม่ใช่ Admin หรือฝ่ายวิชาการ ให้เห็นเฉพาะ Session ที่มีชื่อวิชาตัวเอง
                if (user.role !== 'Admin' && user.division !== 'วิชาการ') {
                    if (mySubjectKey) {
                        filteredForDropdown = allRatings.filter(r =>
                            r.subject && r.subject.toLowerCase().includes(mySubjectKey.toLowerCase())
                        );
                    } else {
                        // กรณีเป็นสตาฟฝ่ายอื่นที่ไม่มีใน Map (เช่น สวัสดิการ) ให้เห็นเฉพาะที่ตัวเองสอน
                        filteredForDropdown = allRatings.filter(r => r.tutor === user.nickname);
                    }
                }

                // สร้างรายการ Session ที่ไม่ซ้ำกันจากข้อมูลที่กรองแล้ว
                const uniqueSessions = [...new Set(filteredForDropdown.map(r => r.subject))].sort();

                // ล้างค่าเก่า (ยกเว้น All) และเติมค่าใหม่
                sessionSelect.innerHTML = '<option value="all">ทุกคาบเรียน</option>';
                uniqueSessions.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = s;
                    sessionSelect.appendChild(opt);
                });

                // ส่วน Admin Filters (คงเดิม)
                if (user.role === 'Admin') {
                    const tutorSelect = document.getElementById('filter-tutor');
                    const uniqueTutors = [...new Set(allRatings.map(r => r.tutor).filter(t => t))].sort();
                    uniqueTutors.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t; opt.innerText = t;
                        tutorSelect.appendChild(opt);
                    });
                }

                filtersInitialized = true;
            }
        window.renderDashboard = function () {
            const myName = user.nickname || user.fullName;
            const mySubjectKey = DIV_TO_SUBJECT_MAP[user.division];

            let displayData = allRatings;

            // 1. กรองสิทธิ์ตาม Division / Tutor
            if (user.role !== 'Admin' && user.division !== 'วิชาการ') {
                displayData = allRatings.filter(r =>
                    (r.tutor === myName) ||
                    (mySubjectKey && r.subject && r.subject.toLowerCase().includes(mySubjectKey.toLowerCase()))
                );
            }

            // 2. กรองตามตัวเลือกใน UI
            const sessionVal = document.getElementById('filter-session').value;
            if (sessionVal !== 'all') displayData = displayData.filter(r => r.subject === sessionVal);

            if (user.role === 'Admin') {
                const tutorVal = document.getElementById('filter-tutor').value;
                const subVal = document.getElementById('filter-subject').value;
                if (tutorVal !== 'all') displayData = displayData.filter(r => r.tutor === tutorVal);
                if (subVal !== 'all') displayData = displayData.filter(r => r.subject.toLowerCase().includes(subVal.toLowerCase()));
            }

            // อัปเดตสถิติ
            const total = displayData.length;
            const avg = total > 0 ? (displayData.reduce((a, b) => a + Number(b.rating), 0) / total).toFixed(1) : "0.0";
            document.getElementById('stat-avg').innerText = avg;
            document.getElementById('stat-count').innerText = total;

            const grid = document.getElementById('feedback-grid');
            if (total === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic">ไม่พบข้อมูลการประเมิน</div>`;
                return;
            }

            grid.innerHTML = displayData.map(r => {
                const cardTitle = (r.tutor === myName) ? "คุณได้รับการประเมิน" : `ติวเตอร์: พี่${r.tutor || 'ไม่ระบุ'}`;
                const classLabel = formatRoomToClass(r.room);

                return `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 hover:border-blue-300 transition-all animate-fade-in flex flex-col h-full">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black text-white uppercase tracking-widest bg-blue-600 px-3 py-1 rounded-full shadow-md">
                                    ${classLabel}
                                </span>
                                <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase italic">${r.subject}</p>
                                <h3 class="font-bold text-slate-800 mt-1">${cardTitle}</h3>
                            </div>
                            <div class="text-xs bg-amber-50 px-2 py-1 rounded-lg border border-amber-100 shrink-0">
                                ${'⭐'.repeat(r.rating || 0)}
                            </div>
                        </div>
                        <div class="flex-1">
                            <p class="text-slate-600 text-sm italic bg-slate-50 p-4 rounded-2xl border-l-4 border-blue-400">
                                "${r.comment || ''}"
                            </p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-50 text-[9px] text-slate-300 font-bold uppercase text-right">
                            ${r.timestamp ? new Date(r.timestamp).toLocaleString('th-TH') : '-'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        init();
    </script>
</body>

</html>
