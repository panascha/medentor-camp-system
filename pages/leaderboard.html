<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Medentor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="text-blue-600 font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                        clip-rule="evenodd" />
                </svg>
                กลับหน้าหลัก
            </a>
            <h1 class="text-xl font-black text-slate-800 uppercase">House Ranking</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Section สำหรับ Admin: แสดง Podium และตาราง -->
        <!-- ค้นหาส่วน <div id="admin-view"> แล้ววางทับด้วย code นี้ -->
        <div id="admin-view" class="hidden space-y-8">
            <!-- Legend: คำอธิบายสีแหล่งคะแนน -->
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-wrap gap-4 justify-center">
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-500"></span><span
                        class="text-[10px] font-bold">ฟิสิกส์</span></div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-500"></span><span
                        class="text-[10px] font-bold">เคมี</span></div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span
                        class="text-[10px] font-bold">ชีวะ</span></div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-amber-500"></span><span
                        class="text-[10px] font-bold">Jeopardy</span></div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-indigo-600"></span><span
                        class="text-[10px] font-bold">ชุมนุมวิชาการ</span></div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-slate-400"></span><span
                        class="text-[10px] font-bold">อื่นๆ</span></div>
            </div>
        
            <div class="grid grid-cols-3 gap-4 items-end pt-10 pb-6" id="podium">
                <!-- Top 3 -->
            </div>
        
            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-[10px] uppercase tracking-widest">
                        <tr>
                            <th class="p-5 w-20">Rank</th>
                            <th class="p-5 w-32">House</th>
                            <th class="p-5">Score Composition (Source Breakdown)</th>
                            <th class="p-5 text-right w-32">Total</th>
                        </tr>
                    </thead>
                    <tbody id="full-ranking-body" class="divide-y divide-slate-50">
                        <!-- รายการบ้านพร้อมแถบสีจะแสดงที่นี่ -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Section สำหรับน้อง/สตาฟ: แสดงเฉพาะบ้านตัวเอง -->
        <div id="user-view" class="hidden flex flex-col items-center justify-center py-20">
            <div
                class="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-blue-500 text-center space-y-4 w-full max-w-sm">
                <p class="text-blue-600 font-black uppercase tracking-[0.2em] text-sm">คะแนนบ้านของคุณ</p>
                <h2 id="my-house-name" class="text-4xl font-black text-slate-800">บ้าน -</h2>
                <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-600 to-indigo-800 py-4"
                    id="my-house-score">
                    0
                </div>
                <p class="text-slate-400 text-xs italic">"สู้ๆ เพื่อชัยชนะของบ้านเรา!"</p>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">กำลังคำนวณคะแนน...</p>
        </div>
    </main>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/leaderboard-logic.js"></script>
</body>

</html>
