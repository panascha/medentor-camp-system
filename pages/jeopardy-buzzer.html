<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
<meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jeopardy Buzzer - Medentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    user-select: none;
}

        body {
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.3s ease;
            height: 100dvh; /* ใช้ dvh เพื่อรองรับ Toolbar ของ Browser มือถือ */
    display: flex;
    flex-direction: column;
        }

        /* เอฟเฟกต์ปุ่มพร้อมกด (Steal Open) */
        @keyframes pulse-gold {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 30px rgba(251, 191, 36, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0);
            }
        }

        .buzzer-active {
            animation: pulse-gold 0.8s infinite;
            background: radial-gradient(circle, #fbbf24 0%, #d97706 100%) !important;
        }

        /* เอฟเฟกต์เมื่อกดติดคนแรก */
        @keyframes win-glow {

            0%,
            100% {
                background-color: #059669;
                transform: scale(1.05);
            }

            50% {
                background-color: #10b981;
                transform: scale(1.1);
            }
        }

        .buzzer-win {
            animation: win-glow 0.4s infinite;
            border-color: white !important;
        }

        .buzzer-btn {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.1s active;
            touch-action: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;  /* ปิดเมนูคลิกขวา/แช่ค้างบน iOS */
    width: 65vmin !important; 
    height: 65vmin !important;
    max-width: 320px !important;
    max-height: 320px !important;
    min-width: 220px !important;
    min-height: 220px !important;
        }

        .state-steal-open {
            background-color: #451a03 !important;
        }

        /* Deep Orange Brown */
        .state-win {
            background-color: #064e3b !important;
        }

        /* Deep Green */

        /* ข้อความลอยเมื่อกดก่อนเวลา */
        .early-text {
            animation: fadeOutUp 1s forwards;
        }

        @keyframes fadeOutUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }


        @keyframes green-glow {
    0% { box-shadow: 0 0 10px #10b981; }
    50% { box-shadow: 0 0 40px #10b981; }
    100% { box-shadow: 0 0 10px #10b981; }
}

.bg-emerald-500 {
    animation: green-glow 0.5s infinite;
}

.bg-red-600 {
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

/* สไตล์ตัวเลือกในมือถือน้อง */
.buzzer-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px !important;
    border-radius: 12px;
    color: white;
    font-weight: 500;
    border: 4px solid transparent;
    transition: all 0.2s;
    min-height: 60px; /* เพิ่มความสูงขั้นต่ำ */
}
.buzzer-opt span {
    font-size: 15px; /* ปรับขนาดตัวอักษรข้อความ */
    line-height: 1.2;
    text-align: left;
    word-break: break-word; /* ตัดคำเมื่อยาวเกิน */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.buzzer-opt b {
    font-size: 24px; /* A B C D ตัวใหญ่ */
    background: rgba(255,255,255,0.2);
    width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
}
/* แอนิเมชันสำหรับมือถือเมื่อกดเลือก */
.buzzer-opt.is-selected {
    border-color: white;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    animation: selected-glow 1s infinite ease-in-out;
}
.buzzer-opt.is-correct {
    background-color: #059669 !important; /* green-600 */
    border: 4px solid #fff !important;
    animation: win-glow 0.5s infinite; /* ใช้ animation เดียวกับปุ่มกดชนะ */
    opacity: 1 !important;
}
.b-opt-0 { background-color: #e21b3c; }
.b-opt-1 { background-color: #1368ce; }
.b-opt-2 { background-color: #d89e00; }
.b-opt-3 { background-color: #26890c; }

.kahoot-mini-symbol {
    width: 14px;
    height: 14px;
    fill: white;
    flex-shrink: 0;
}

        /* iPad แนวนอน: ลดช่องว่างเพื่อให้เห็นปุ่มชัดขึ้น */
@media (min-width: 1024px) and (orientation: landscape) {
    #status-card {
        padding: 0.75rem !important;
        margin-bottom: 0px !important;
    }
    #early-msg-container {
        margin-top: 0px !important;
    }
}


@media (max-height: 667px) {
    #status-card h2 { font-size: 1rem !important; }
    #buzzer-icon { font-size: 3rem !important; }
    #buzzer-text { font-size: 1rem !important; }
}
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col" id="main-body">

    <!-- Header -->
    <nav
        class="bg-slate-900/80 backdrop-blur-md p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div id="house-badge"
                class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center font-black text-2xl shadow-lg border-2 border-white/20">
                ?</div>
                <div class="ml-2 text-[8px] font-mono opacity-50">
                    Ping: <span id="local-ping-display">--</span>
                </div>
            <div>
                <p id="display-name" class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Loading...
                </p>
                <h1 class="text-sm font-black text-white tracking-widest">BUZZER PANEL</h1>
            </div>
        </div>
        <button onclick="location.reload()"
            class="p-3 bg-slate-800 rounded-2xl text-slate-400 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-evenly p-2 overflow-auto space-y-6">
    
        <!-- Status & Question Card -->
        <div id="status-card"
            class="w-full max-w-2xl bg-slate-900/50 border border-slate-700 rounded-xl p-6 text-center shadow-lg transition-all">
            <!-- Header Status -->
            <div class="p-3 border-b border-slate-700 bg-slate-900/50 flex items-center justify-center gap-2">
                <div id="game-status-dot" class="w-2 h-2 rounded-full bg-slate-500"></div>
                <p id="game-status-text" class="text-blue-400 font-black uppercase tracking-widest text-[9px] italic">
                    รอเริ่มเกม...</p>
            </div>
        
            <!-- Question Area (จะถูกเปิด-ปิดโดย JS) -->
            <div id="question-content-area" class="hidden p-4 space-y-3">
                <div class="bg-blue-600/20 rounded-xl p-3 border border-blue-500/30">
                    <p id="buzzer-q-text" class="text-white text-xl leading-relaxed text-center">...โจทย์คำถาม...</p>
                </div>
        
                <!-- Options Grid (Kahoot Style) -->
                <div id="buzzer-options-grid" class="grid grid-cols-2 gap-2">
                    <!-- ตัวเลือกจะถูกสร้างที่นี่ -->
                </div>
            </div>
        
            <!-- Default Info (ตอนไม่มีคำถาม) -->
            <div id="default-info" class="p-4 text-center">
                <h2 id="question-info" class="text-lg font-bold text-white leading-tight">เตรียมตัวให้พร้อม</h2>
                <div id="timer-display" class="hidden mt-1 text-2xl font-black text-amber-400 tabular-nums">0.0</div>
            </div>
        </div>

        <div id="f1-lights-outer" class="hidden w-full flex flex-col items-center animate-fade-in">
            <div id="f1-lights-container" class="flex gap-3 mb-2">
                <!-- ไฟ 5 ดวงจะถูกสร้างที่นี่ -->
            </div>
            <p id="f1-status-text" class="text-xs font-black text-red-500 uppercase tracking-[0.3em] animate-pulse">HOLD IT!</p>
        </div>
    
        <!-- Buzzer Area: นำ Container มารวมกันเพื่อคุมขนาด -->
        <div class="relative flex items-center justify-center">
            <div id="buzzer-ring"
                class="absolute inset-0 bg-slate-700 rounded-full blur-3xl opacity-20 scale-125 transition-all"></div>
    
            <!-- ขนาดปุ่มถูกคุมด้วย CSS .buzzer-btn ด้านบนแล้ว -->
            <button id="main-buzzer" disabled onclick="handleBuzzIn()"
                class="buzzer-btn relative rounded-full bg-slate-800 border-[8px] border-slate-700 flex flex-col items-center justify-center shadow-2xl active:scale-95 disabled:opacity-50">
                <span id="buzzer-icon" class="text-4xl md:text-6xl mb-1">🔒</span>
                <span id="buzzer-text"
                    class="text-sm md:text-lg font-black uppercase tracking-tighter text-slate-500">Wait...</span>
                <div id="inner-glow"
                    class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none"
                    style="box-shadow: inset 0 0 40px rgba(255,255,255,0.5);"></div>
            </button>
        </div>
    
        <!-- Alert Message & Result: จัดให้อยู่ในพื้นที่ที่เหลือ -->
        <div class="flex flex-col items-center gap-1">
            <div id="early-msg-container" class="h-6 text-red-500 font-bold text-sm overflow-hidden"></div>
            <div id="result-msg" class="hidden w-full max-w-xs p-2 rounded-xl text-center font-bold animate-bounce text-xs">
            </div>
        </div>
    
    </main>

    <!-- Footer Stats -->
    <footer class="p-4 bg-slate-800/30 border-t border-slate-800">
        <div class="flex justify-between items-center text-slate-400">
            <div class="text-center flex-1 border-r border-slate-700">
                <p class="text-[9px] uppercase font-black tracking-widest">คะแนน</p>
                <p id="my-score" class="text-lg font-black text-white">0</p>
            </div>
            <div class="text-center flex-1">
                <p class="text-[9px] uppercase font-black tracking-widest">เทิร์น</p>
                <p id="my-turns" class="text-lg font-black text-white">0/2</p>
            </div>
        </div>
    </footer>

    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js" }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, set, runTransaction, update } from "firebase/database";

        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);
        const user = checkAuth();

        let gameState = {};
            let myHouseId = user.house ? user.house.toString() : null;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let lastClickTime = 0;
            const SPAM_THRESHOLD = 5000; // 5 วินาที
            let isStunned = false;

        if (!user || !user.house) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('display-name').innerText = `น้อง${user.nickname} (${user.id})`;
            document.getElementById('house-badge').innerText = user.house;
            initBuzzerLogic();
            enforceOneDevicePerHouse();
            startPingTracker();
        }

        // ฟังก์ชันเสียง Beep สั้นๆ
        function playBeep(freq = 440, duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function initBuzzerLogic() {
            onValue(ref(db, 'jeopardy'), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // ตรวจสอบการเปลี่ยนสถานะเพื่อเล่นเสียง
                if (gameState.game_state?.is_steal_open === false && data.game_state?.is_steal_open === true) {
                    playBeep(880, 0.2); // เสียงสูงเมื่อเปิด Steal
                    if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
                }

                gameState = data;
                updateUI(data);
            });
        }

        async function enforceOneDevicePerHouse() {
            const houseSessionRef = ref(db, `jeopardy/houses/${user.house}/active_session_id`);
            await set(houseSessionRef, user.sessionId);
            onValue(houseSessionRef, (snapshot) => {
                if (snapshot.val() && snapshot.val() !== user.sessionId) {
                    Swal.fire({
                        title: 'ถูกยกเลิกการเชื่อมต่อ',
                        text: 'บ้านนี้มีคนอื่นเข้าใช้งานซ้อน (1 บ้าน/1 เครื่อง)',
                        icon: 'warning',
                        confirmButtonText: 'ตกลง',
                        allowOutsideClick: false
                    }).then(() => window.location.href = '../index.html');
                }
            });
        }

        async function startPingTracker() {
                // ป้องกันกรณี myHouseId เป็น null
                if (!myHouseId) return;

                const pingRef = ref(db, `jeopardy/houses/${myHouseId}`);

                setInterval(async () => {
                    const startTime = Date.now();
                    try {
                        // 1. ส่งสัญญาณว่ายังออนไลน์อยู่ (Update timestamp)
                        await update(pingRef, {
                            last_active_ts: startTime
                        });

                        // 2. วัดผลความเร็ว (Latency)
                        const ping = Date.now() - startTime;

                        // 3. บันทึกค่า Ping
                        await update(pingRef, { ping: ping });

                        // อัปเดต UI ฝั่งน้อง
                        const pingDisplay = document.getElementById('local-ping-display');
                        if (pingDisplay) {
                            pingDisplay.innerText = `${ping}ms`;
                            pingDisplay.className = ping < 150 ? 'text-emerald-500' : (ping < 350 ? 'text-amber-500' : 'text-red-500');
                        }
                    } catch (e) {
                        console.error("Ping Failed:", e);
                    }
                }, 20000); // ทุก 20 วินาที
            }
        function updateUI(data) {
                const gs = data.game_state;
                const hData = data.houses[myHouseId] || {};
                const buzzerData = data.buzzers || {};

                // อัปเดตส่วนคำถามและตัวเลือก
                const qArea = document.getElementById('question-content-area');
            const defaultInfo = document.getElementById('default-info');
            const qTextEl = document.getElementById('buzzer-q-text');
            const optionsGrid = document.getElementById('buzzer-options-grid');

            const activeQId = gs.active_question_id;
            const qData = (data.questions && activeQId) ? data.questions[activeQId] : null;

            if (qData && (gs.status === 'QUESTION' || gs.status === 'STEAL_WAIT')) {
                qArea.classList.remove('hidden');
                defaultInfo.classList.add('hidden');

                // ใส่โจทย์
                qTextEl.innerText = qData.question_text;

                // ใส่ตัวเลือก (ถ้ามี)
                if (qData.options && qData.options.trim() !== "") {
                    optionsGrid.classList.remove('hidden'); 
                    const choices = qData.options.split(/\r?\n|\\n/).filter(line => line.trim() !== "");
                    const labels = ['A', 'B', 'C', 'D'];
                    const wrongAnswers = gs.wrong_answers || []; // <--- ดึงรายการข้อที่ผิดจาก Firebase

                    const currentAnswering = (gs.status === 'STEAL_WAIT' && buzzerData.winner)
                        ? buzzerData.winner.toString()
                        : gs.active_house.toString();

                    const isMyTurn = currentAnswering === myHouseId; 
                    
                    optionsGrid.innerHTML = choices.slice(0, 4).map((choice, idx) => {
                        let cleanChoice = choice.trim().replace(/^[A-D][.:]\s*/i, "");
                        const isSelected = gs.selected_answer === idx;
                        const isAlreadyWrong = wrongAnswers.includes(idx);

                        // --- เช็คว่าข้อนี้ถูกตัดสินว่า "ถูก" แล้วหรือยัง ---
                        const isThisCorrect = gs.is_judged && gs.manual_result === true && gs.selected_answer === idx;

                        return `
        <div onclick="${(isAlreadyWrong || gs.is_judged) ? '' : `window.selectJeopardyAnswer(${idx})`}" 
             class="buzzer-opt b-opt-${idx} 
             ${isSelected ? 'is-selected' : ''} 
             ${isThisCorrect ? 'is-correct' : ''}
             ${isAlreadyWrong ? 'opacity-20 grayscale pointer-events-none' : (isMyTurn ? 'active:scale-95' : 'opacity-40')}">
            <b class="text-xl">${isThisCorrect ? '✓' : labels[idx]}</b>
            <span>${cleanChoice}</span>
        </div>`;
                    }).join('');
                } else {
                    optionsGrid.classList.add('hidden');
                    optionsGrid.innerHTML = ""; 
                }
            } else {
                qArea.classList.add('hidden');
                defaultInfo.classList.remove('hidden');
            }

                // 1. อัปเดตสถิติตัวเลข (คะแนนและเทิร์น)
                const scoreEl = document.getElementById('my-score');
                const turnsEl = document.getElementById('my-turns');
                if (scoreEl) scoreEl.innerText = hData.jeopardy_score || 0;
                if (turnsEl) turnsEl.innerText = `${hData.turns_played || 0}/2`;

                // 2. อ้างอิง Elements หลัก
                const btn = document.getElementById('main-buzzer');
                const icon = document.getElementById('buzzer-icon');
                const text = document.getElementById('buzzer-text');
                const statusText = document.getElementById('game-status-text');
                const statusDot = document.getElementById('game-status-dot');
                const questionInfo = document.getElementById('question-info');
                const ring = document.getElementById('buzzer-ring');
                const body = document.getElementById('main-body');
                const innerGlow = document.getElementById('inner-glow');

                // ตรวจสอบเบื้องต้นว่ามีปุ่มให้กดไหม ถ้าไม่มีให้หยุดทำงานป้องกัน Error
                if (!btn) return;

                // 3. Reset UI พื้นฐาน (Clear ทุกสถานะก่อนเริ่มเงื่อนไขใหม่)
                btn.className = "buzzer-btn relative w-[75vw] h-[75vw] max-w-[280px] max-h-[280px] rounded-full flex flex-col items-center justify-center shadow-2xl transition-all active:scale-95 disabled:opacity-50 border-[10px]";
                if (body) body.className = "bg-slate-950 text-white min-h-screen flex flex-col transition-all duration-500";
                if (ring) ring.className = "absolute inset-0 rounded-full blur-2xl opacity-0 scale-125 transition-all";
                if (innerGlow) innerGlow.style.opacity = "0";
                if (statusDot) statusDot.className = "inline-block w-2 h-2 rounded-full mr-1";
                if (statusText) statusText.classList.remove('text-yellow-400');

                // 4. ตรวจสอบสถานะเกม (Logic)
                if (gs.status === 'BOARD') {
                    const isMyTurn = gs.active_house == myHouseId;
                    if (statusText) statusText.innerText = "Board Phase";
                    if (questionInfo) questionInfo.innerText = isMyTurn ? "ถึงตาบ้านคุณ! เลือกแผ่นป้าย" : `บ้าน ${gs.active_house} กำลังเลือก...`;
                    if (icon) icon.innerText = isMyTurn ? "🎯" : "⌛";
                    if (text) text.innerText = isMyTurn ? "YOUR TURN" : "WAITING";

                    btn.disabled = true;
                    btn.classList.add('bg-slate-900', 'border-slate-800');
                    if (isMyTurn && statusDot) statusDot.classList.add('bg-blue-500', 'animate-pulse');
                }
                else if (gs.status === 'QUESTION') {
                    if (statusText) statusText.innerText = "Question Phase";
                    const q = data.questions?.[gs.active_question_id];
                    if (questionInfo) questionInfo.innerText = `${q?.category || 'Question'} (${q?.points || 0} Pts)`;
                    if (icon) icon.innerText = "🚫";
                    if (text) text.innerText = "LOCKED";

                    btn.disabled = true;
                    btn.classList.add('bg-slate-900', 'border-slate-800');
                }
                else if (gs.status === 'STEAL_WAIT') {
                    const myHouseIdInt = parseInt(myHouseId);
                    const isWinner = buzzerData.winner == myHouseId;
                    const someoneElseWon = buzzerData.winner && buzzerData.winner != myHouseId;
                    const isOwner = gs.active_house === myHouseIdInt; // เช็คว่าเป็นเจ้าของข้อไหม
                    const f1Outer = document.getElementById('f1-lights-outer');
                    const elapsed = Date.now() - (gs.steal_start_ts || Date.now());
                    const sequenceFinished = elapsed >= 4000; // ไฟ 5 ดวง ดวงละ 0.8s = 4000ms

                    // --- [กรณีที่ 1: ถ้าเราเป็นเจ้าของข้อ] ---
                    if (isOwner) {
                        statusText.innerText = "WAITING FOR STEAL";
                        questionInfo.innerText = "บ้านคุณไม่มีสิทธิ์ Steal ข้อนี้";
                        icon.innerText = "🚫";
                        text.innerText = "BLOCKED";
                        btn.disabled = true; // ล็อคปุ่มถาวร
                        btn.className = "buzzer-btn relative rounded-full bg-slate-900 border-[8px] border-slate-800 flex flex-col items-center justify-center opacity-50";
                        f1Outer.classList.add('hidden'); // ซ่อนไฟ F1 สำหรับเจ้าของ
                    }
                    else if (isStunned) {
                        statusText.innerText = "STUNNED / LOCKED";
                        statusText.classList.add('text-red-500');
                        questionInfo.innerHTML = `<p class="text-red-500 font-black text-xl animate-pulse">กดเร็วไป! ปุ่มล็อค 5 วินาที</p>`;
                        icon.innerText = "😵";
                        text.innerText = "WAITING...";
                        btn.disabled = true;
                        btn.className = "buzzer-btn relative rounded-full bg-red-900 border-[10px] border-red-500 flex flex-col items-center justify-center shadow-[0_0_50px_rgba(239,68,68,0.5)]";
                        f1Outer.classList.add('hidden'); // ซ่อนไฟวิ่งไปก่อนเพื่อให้เห็นว่าโดนทำโทษ
                    }
                    // --- [กรณีที่ 2: ถ้าเราไม่ใช่เจ้าของ (มีสิทธิ์ขโมย)] ---
                    else {
                        if (isWinner) {
                            // เรากดติดคนแรก
                            statusText.innerText = "YOU BUZZED IN!";
                            if (body) body.classList.add('state-win');
                            questionInfo.innerText = "บ้านคุณได้สิทธิ์ตอบ!";
                            icon.innerText = "🎯";
                            text.innerText = "ANSWER NOW";
                            btn.classList.add('buzzer-win');
                            btn.disabled = true;
                            f1Outer.classList.add('hidden');
                        }
                        else if (someoneElseWon) {
                            // บ้านอื่นกดติดไปแล้ว
                            statusText.innerText = "TOO LATE!";
                            questionInfo.innerText = `บ้าน ${buzzerData.winner} ได้สิทธิ์ไปแล้ว`;
                            icon.innerText = "💨";
                            text.innerText = "LOCKED";
                            btn.disabled = true;
                            btn.classList.add('bg-red-950', 'border-red-900');
                            f1Outer.classList.add('hidden');
                        }
                        else if (gs.countdown_active || (gs.is_steal_open && !sequenceFinished)) {
                            // ถ้า Firebase สั่งนับถอยหลัง OR (สั่งเขียวแล้วแต่ไฟแดงในจอน้องยังวิ่งไม่ครบ 5 ดวง)
                            renderBuzzerLights(gs);
                            statusText.innerText = "COUNTDOWN...";
                            icon.innerText = "🛑";
                            text.innerText = "WAIT...";
                            btn.disabled = false;
                            btn.className = "buzzer-btn relative rounded-full bg-slate-900 border-[8px] border-red-900 flex flex-col items-center justify-center opacity-100";

                            // บังคับ Loop ให้เนียน
                            setTimeout(() => updateUI(gameState), 50);
                        }
                        else if (gs.is_steal_open && sequenceFinished) {
                            // ต้องเขียวจาก Firebase และไฟในเครื่องต้องวิ่งครบ 5 ดวงแล้วเท่านั้นถึงจะแสดงสีเขียว
                            f1Outer.classList.add('hidden');
                            statusText.innerText = "STEAL NOW!";
                            statusText.classList.add('text-emerald-400');
                            questionInfo.innerHTML = `<p class="text-emerald-500 font-black text-2xl animate-bounce">GO GO GO!</p>`;
                            icon.innerText = "⚡";
                            text.innerText = "PRESS!";
                            btn.disabled = false;
                            btn.className = "buzzer-btn buzzer-active relative rounded-full border-[8px] border-emerald-400 flex flex-col items-center justify-center";
                            body.classList.add('state-steal-open');
                        } 
                        else {
                            // รอสตาฟสั่งเริ่ม
                            statusText.innerText = "READY TO STEAL";
                            questionInfo.innerText = "เตรียมตัวกดปุ่ม...";
                            icon.innerText = "✋";
                            text.innerText = "GET READY";
                            btn.disabled = false;
                            btn.classList.add('bg-indigo-950', 'border-indigo-800');
                            f1Outer.classList.add('hidden');
                        }
                    }
                }
            }

            window.selectJeopardyAnswer = async function (answerIndex) {
                    if (isStunned) return;

                    const gs = gameState.game_state;
                    const buzzerData = gameState.buzzers || {};

                    // 1. ตรวจสอบสถานะเกม: ต้องไม่อยู่หน้าบอร์ด
                    if (!gs || gs.status === 'BOARD') return;

                    // 2. ตรวจสอบว่าข้อนี้ถูกตอบผิดไปแล้วหรือยัง
                    const wrongAnswers = gs.wrong_answers || [];
                    if (wrongAnswers.includes(answerIndex)) {
                        showToast("ข้อนี้ถูกตอบไปแล้วและผิด!", "error");
                        return;
                    }

                    // 3. ตรวจสอบสิทธิ์การกดเลือกคำตอบ
                    let canISelect = false;

                    if (gs.status === 'QUESTION') {
                        // เฟสปกติ: ต้องเป็นเจ้าของข้อเท่านั้นที่กดได้
                        if (gs.active_house.toString() === myHouseId) canISelect = true;
                    }
                    else if (gs.status === 'STEAL_WAIT') {
                        // เฟส Steal: ต้องเป็น "ผู้ชนะ Buzzer" เท่านั้นถึงจะกดเลือกคำตอบได้
                        if (buzzerData.winner && buzzerData.winner.toString() === myHouseId) {
                            canISelect = true;
                        }
                    }

                    if (canISelect) {
                        try {
                            await update(ref(db, 'jeopardy/game_state'), {
                                selected_answer: answerIndex
                            });
                            if (typeof playBeep === 'function') playBeep(550, 0.05);
                        } catch (e) {
                            console.error("Select Answer Error:", e);
                        }
                    } else {
                        console.log("คุณไม่มีสิทธิ์เลือกคำตอบในขณะนี้");
                    }
                };
            window.handleBuzzIn = async function () {
                    const now = Date.now();
                    const gs = gameState.game_state;
                    const buzz = gameState.buzzers;
                    const myHouseIdInt = parseInt(myHouseId);
                    const randomDelay = gs.steal_random_delay || 1000;
                const greenStartTime = gs.steal_start_ts + 4000 + randomDelay; // คำนวณหาเวลาที่ไฟเขียวควรติดจริง

                    if (isStunned) return;

                    // เช็คว่าเคยกดไปแล้วหรือยัง (ป้องกันการส่งซ้ำในข้อเดิม)
                    if (buzz?.attempts && buzz.attempts[myHouseId]) return;

                    if (myHouseIdInt === gs.active_house) {
                        showToast("คุณเป็นเจ้าของข้อ ไม่สามารถ Steal ได้", "error");
                        return;
                    }

                    // --- [ระบบ STUN: กดก่อนเวลา] ---
                if (!gs?.is_steal_open || gs?.countdown_active || now < greenStartTime) {
                    if (gs?.status === 'STEAL_WAIT') {
                        isStunned = true; // เปิดสถานะโดนทำโทษ

                        // สั่นและแจ้งเตือน
                        if ("vibrate" in navigator) navigator.vibrate(500);
                        showEarlyAlert();

                        // สั่งอัปเดต UI ทันทีเพื่อให้ปุ่มกลายเป็นสีแดงมึนงง
                        updateUI(gameState);

                        // ปลดล็อคหลังจาก 5 วินาที
                        setTimeout(() => {
                            isStunned = false;
                            updateUI(gameState); // อัปเดตกลับเป็นสถานะปัจจุบันของเกม
                        }, 5000);
                    }
                    return;
                }

                    // --- [ระบบบันทึกเวลา] ---
                    // ถ้ามีคนชนะแล้ว ให้เช็คว่าเกิน 5 วิหรือยัง ถ้าเกินแล้วไม่ต้องทำอะไร
                    if (buzz?.is_locked && buzz?.timestamp) {
                        if (now - buzz.timestamp > 5000) return;
                    }

                    // ส่งเวลาการกดเข้า Firebase ทันที (เพื่อให้ Admin เห็นลำดับ)
                    const attemptUpdate = {};
                    attemptUpdate[`jeopardy/buzzers/attempts/${myHouseId}`] = now;
                    await update(ref(db), attemptUpdate);

                    // --- [ระบบตัดสินผู้ชนะคนแรก] ---
                    if (!buzz?.is_locked) {
                        if ("vibrate" in navigator) navigator.vibrate(100);
                        playBeep(660, 0.1);

                        const buzzerRef = ref(db, 'jeopardy/buzzers');
                        try {
                            const result = await runTransaction(buzzerRef, (currentData) => {
                                if (currentData === null || currentData.is_locked === false) {
                                    return { ...currentData, is_locked: true, winner: myHouseIdInt, timestamp: now };
                                }
                                return; // ถ้ามีคนตัดหน้าไปก่อน Transaction จะยกเลิกเอง
                            });

                            if (result.committed) {
                                await update(ref(db, 'jeopardy/game_state'), { answering_house: myHouseIdInt });
                            }
                        } catch (error) { console.error(error); }
                    } else {
                        // กรณีไม่ใช่คนแรกแต่ยังอยู่ใน 5 วิ
                        if ("vibrate" in navigator) navigator.vibrate(40);
                        playBeep(440, 0.05); // เสียงเบาลงเพื่อให้รู้ว่ากดติดแต่ไม่ชนะ
                        showToast("บันทึกเวลาเรียบร้อย!", "info");
                    }
                };
        // ฟังก์ชันแสดง Alert เวลาคนกดก่อนไฟเหลือง
    function showEarlyAlert() {
        const container = document.getElementById('early-msg-container');
        if (!container) return;

        // เปลี่ยนข้อความให้ชัดเจน
        container.innerHTML = `<div class="early-text text-center text-red-500 font-black animate-bounce">
        ⚠️ เร็วไป! ปุ่มล็อค 5.0s
    </div>`;

        if ("vibrate" in navigator) navigator.vibrate(300);

        // ลบข้อความหลัง 5 วิ
        setTimeout(() => { container.innerHTML = ""; }, 5000);
    }

    function renderBuzzerLights(gs) {
            const container = document.getElementById('f1-lights-container');
            const outer = document.getElementById('f1-lights-outer');
            if (!container || !gs.steal_start_ts) return;

            // คำนวณเวลาที่ผ่านไป (ms)
            const elapsed = Date.now() - gs.steal_start_ts;

            // คำนวณจำนวนไฟ (1 ดวงทุก 0.8 วินาที)
            // ใช้ Math.max(0, ...) กันค่าติดลบกรณี Clock เครื่องน้องช้ากว่า Server
            const activeCount = Math.floor(Math.max(0, elapsed) / 800);
            const lights = [1, 2, 3, 4, 5];

            outer.classList.remove('hidden');

            container.innerHTML = lights.map(i => {
                const isOn = activeCount >= i;
                // ถ้าวิ่งเกิน 5 ให้ดับไฟแดงรอ (เพื่อรอจังหวะ random delay ของไฟเขียว)
                const isRed = isOn && activeCount <= 5;

                return `
            <div class="w-10 h-10 rounded-full border-4 border-slate-800 shadow-inner transition-all duration-150
                ${isRed ? 'bg-red-600 shadow-[0_0_20px_#dc2626]' : 'bg-slate-900'}">
            </div>
        `;
            }).join('');

            const statusTxt = document.getElementById('f1-status-text');
            if (activeCount >= 5) {
                statusTxt.innerText = "READY... HOLD!";
                statusTxt.className = "text-sm font-black text-amber-500 tracking-[0.3em] animate-pulse";
            } else {
                statusTxt.innerText = "WAIT FOR LIGHTS...";
                statusTxt.className = "text-xs font-bold text-slate-500 tracking-widest";
            }
        }
        document.addEventListener('touchstart', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault(); // ป้องกันการใช้ 2 นิ้วขยายหน้าจอ
                }
            }, { passive: false });

            let lastTouchEnd = 0;
            document.addEventListener('touchend', function (event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault(); // ป้องกัน Double-tap to zoom
                }
                lastTouchEnd = now;
            }, false);

            // สำหรับ iOS เฉพาะทาง (ห้ามขยายด้วย Gesture)
            document.addEventListener('gesturestart', function (event) {
                event.preventDefault();
            });
        </script>
