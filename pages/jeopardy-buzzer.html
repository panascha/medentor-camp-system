<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeopardy Buzzer - Medentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    user-select: none;
}

        body {
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.3s ease;
        }

        /* เอฟเฟกต์ปุ่มพร้อมกด (Steal Open) */
        @keyframes pulse-gold {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 30px rgba(251, 191, 36, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0);
            }
        }

        .buzzer-active {
            animation: pulse-gold 0.8s infinite;
            background: radial-gradient(circle, #fbbf24 0%, #d97706 100%) !important;
        }

        /* เอฟเฟกต์เมื่อกดติดคนแรก */
        @keyframes win-glow {

            0%,
            100% {
                background-color: #059669;
                transform: scale(1.05);
            }

            50% {
                background-color: #10b981;
                transform: scale(1.1);
            }
        }

        .buzzer-win {
            animation: win-glow 0.4s infinite;
            border-color: white !important;
        }

        .buzzer-btn {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.1s active;
            touch-action: none;
    user-select: none;            /* ป้องกันการคลุมดำข้อความ */
    -webkit-user-select: none;
    -webkit-touch-callout: none;  /* ปิดเมนูคลิกขวา/แช่ค้างบน iOS */
        }

        .state-steal-open {
            background-color: #451a03 !important;
        }

        /* Deep Orange Brown */
        .state-win {
            background-color: #064e3b !important;
        }

        /* Deep Green */

        /* ข้อความลอยเมื่อกดก่อนเวลา */
        .early-text {
            animation: fadeOutUp 1s forwards;
        }

        @keyframes fadeOutUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col" id="main-body">

    <!-- Header -->
    <nav
        class="bg-slate-900/80 backdrop-blur-md p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div id="house-badge"
                class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center font-black text-2xl shadow-lg border-2 border-white/20">
                ?</div>
            <div>
                <p id="display-name" class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Loading...
                </p>
                <h1 class="text-sm font-black text-white tracking-widest">BUZZER PANEL</h1>
            </div>
        </div>
        <button onclick="location.reload()"
            class="p-3 bg-slate-800 rounded-2xl text-slate-400 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 gap-4 overflow-hidden">
    
        <!-- Game Info Status -->
        <div id="status-card"
            class="w-full max-w-sm bg-slate-800/50 p-5 rounded-[2rem] border border-slate-700 text-center shadow-2xl">
            <!-- เพิ่ม id="game-status-dot" -->
            <div id="game-status-dot" class="inline-block w-2 h-2 rounded-full bg-slate-500 mb-1 mr-1"></div>
            <p id="game-status-text"
                class="inline-block text-blue-400 font-black uppercase tracking-widest text-xs mb-1 italic">
                รอเริ่มเกม...</p>
            <h2 id="question-info" class="text-xl font-bold text-white">เตรียมตัวให้พร้อม</h2>
            <div id="timer-display" class="hidden mt-2 text-3xl font-black text-amber-400 tabular-nums">0.0</div>
        </div>
    
        <!-- Buzzer Button -->
        <div class="relative flex items-center justify-center">
            <div id="buzzer-ring"
                class="absolute inset-0 bg-slate-700 rounded-full blur-2xl opacity-20 scale-125 transition-all"></div>
    
            <button id="main-buzzer" disabled onclick="handleBuzzIn()"
                class="buzzer-btn relative w-[75vw] h-[75vw] max-w-[280px] max-h-[280px] rounded-full bg-slate-800 border-[10px] border-slate-700 flex flex-col items-center justify-center shadow-2xl transition-all active:scale-95 disabled:opacity-50">
    
                <span id="buzzer-icon" class="text-5xl md:text-6xl mb-1">🔒</span>
                <span id="buzzer-text"
                    class="text-lg md:text-xl font-black uppercase tracking-tighter text-slate-500">Wait...</span>
    
                <!-- เพิ่ม id="inner-glow" -->
                <div id="inner-glow"
                    class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none"
                    style="box-shadow: inset 0 0 40px rgba(255,255,255,0.5);"></div>
            </button>
        </div>
    
        <!-- เพิ่ม id="early-msg-container" -->
        <div id="early-msg-container" class="h-8 text-red-500 font-bold overflow-hidden mt-2"></div>
    
        <!-- Notification / Result -->
        <div id="result-msg" class="hidden w-full max-w-sm p-3 rounded-2xl text-center font-bold animate-bounce text-sm">
        </div>
    
    </main>

    <!-- Footer Stats -->
    <footer class="p-4 bg-slate-800/30 border-t border-slate-800">
        <div class="flex justify-between items-center text-slate-400">
            <div class="text-center flex-1 border-r border-slate-700">
                <p class="text-[9px] uppercase font-black tracking-widest">คะแนน</p>
                <p id="my-score" class="text-lg font-black text-white">0</p>
            </div>
            <div class="text-center flex-1">
                <p class="text-[9px] uppercase font-black tracking-widest">เทิร์น</p>
                <p id="my-turns" class="text-lg font-black text-white">0/2</p>
            </div>
        </div>
    </footer>

    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js" }}
    </script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, set, runTransaction, update } from "firebase/database";

        const app = initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = getDatabase(app);
        const user = checkAuth();

        if (!user || !user.house) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('display-name').innerText = `น้อง${user.nickname} (${user.id})`;
            document.getElementById('house-badge').innerText = user.house;
            initBuzzerLogic();
            enforceOneDevicePerHouse();
        }

        let gameState = {};
        let myHouseId = user.house.toString();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastClickTime = 0;
        const SPAM_THRESHOLD = 1000; // 1 วินาที
        let isStunned = false;

        // ฟังก์ชันเสียง Beep สั้นๆ
        function playBeep(freq = 440, duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function initBuzzerLogic() {
            onValue(ref(db, 'jeopardy'), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // ตรวจสอบการเปลี่ยนสถานะเพื่อเล่นเสียง
                if (gameState.game_state?.is_steal_open === false && data.game_state?.is_steal_open === true) {
                    playBeep(880, 0.2); // เสียงสูงเมื่อเปิด Steal
                    if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
                }

                gameState = data;
                updateUI(data);
            });
        }

        async function enforceOneDevicePerHouse() {
            const houseSessionRef = ref(db, `jeopardy/houses/${user.house}/active_session_id`);
            await set(houseSessionRef, user.sessionId);
            onValue(houseSessionRef, (snapshot) => {
                if (snapshot.val() && snapshot.val() !== user.sessionId) {
                    Swal.fire({
                        title: 'ถูกยกเลิกการเชื่อมต่อ',
                        text: 'บ้านนี้มีคนอื่นเข้าใช้งานซ้อน (1 บ้าน/1 เครื่อง)',
                        icon: 'warning',
                        confirmButtonText: 'ตกลง',
                        allowOutsideClick: false
                    }).then(() => window.location.href = '../index.html');
                }
            });
        }

        function updateUI(data) {
                const gs = data.game_state;
                const hData = data.houses[myHouseId] || {};
                const buzzerData = data.buzzers || {};

                // 1. อัปเดตสถิติตัวเลข (คะแนนและเทิร์น)
                const scoreEl = document.getElementById('my-score');
                const turnsEl = document.getElementById('my-turns');
                if (scoreEl) scoreEl.innerText = hData.jeopardy_score || 0;
                if (turnsEl) turnsEl.innerText = `${hData.turns_played || 0}/2`;

                // 2. อ้างอิง Elements หลัก
                const btn = document.getElementById('main-buzzer');
                const icon = document.getElementById('buzzer-icon');
                const text = document.getElementById('buzzer-text');
                const statusText = document.getElementById('game-status-text');
                const statusDot = document.getElementById('game-status-dot');
                const questionInfo = document.getElementById('question-info');
                const ring = document.getElementById('buzzer-ring');
                const body = document.getElementById('main-body');
                const innerGlow = document.getElementById('inner-glow');

                // ตรวจสอบเบื้องต้นว่ามีปุ่มให้กดไหม ถ้าไม่มีให้หยุดทำงานป้องกัน Error
                if (!btn) return;

                // 3. Reset UI พื้นฐาน (Clear ทุกสถานะก่อนเริ่มเงื่อนไขใหม่)
                btn.className = "buzzer-btn relative w-[75vw] h-[75vw] max-w-[280px] max-h-[280px] rounded-full flex flex-col items-center justify-center shadow-2xl transition-all active:scale-95 disabled:opacity-50 border-[10px]";
                if (body) body.className = "bg-slate-950 text-white min-h-screen flex flex-col transition-all duration-500";
                if (ring) ring.className = "absolute inset-0 rounded-full blur-2xl opacity-0 scale-125 transition-all";
                if (innerGlow) innerGlow.style.opacity = "0";
                if (statusDot) statusDot.className = "inline-block w-2 h-2 rounded-full mr-1";
                if (statusText) statusText.classList.remove('text-yellow-400');

                // 4. ตรวจสอบสถานะเกม (Logic)
                if (gs.status === 'BOARD') {
                    const isMyTurn = gs.active_house == myHouseId;
                    if (statusText) statusText.innerText = "Board Phase";
                    if (questionInfo) questionInfo.innerText = isMyTurn ? "ถึงตาบ้านคุณ! เลือกแผ่นป้าย" : `บ้าน ${gs.active_house} กำลังเลือก...`;
                    if (icon) icon.innerText = isMyTurn ? "🎯" : "⌛";
                    if (text) text.innerText = isMyTurn ? "YOUR TURN" : "WAITING";

                    btn.disabled = true;
                    btn.classList.add('bg-slate-900', 'border-slate-800');
                    if (isMyTurn && statusDot) statusDot.classList.add('bg-blue-500', 'animate-pulse');
                }
                else if (gs.status === 'QUESTION') {
                    if (statusText) statusText.innerText = "Question Phase";
                    const q = data.questions?.[gs.active_question_id];
                    if (questionInfo) questionInfo.innerText = `${q?.category || 'Question'} (${q?.points || 0} Pts)`;
                    if (icon) icon.innerText = "🚫";
                    if (text) text.innerText = "LOCKED";

                    btn.disabled = true;
                    btn.classList.add('bg-slate-900', 'border-slate-800');
                }
                else if (gs.status === 'STEAL_WAIT') {
                    const myHouseIdInt = parseInt(myHouseId);
                    const isWinner = buzzerData.winner == myHouseId;
                    const someoneElseWon = buzzerData.winner && buzzerData.winner != myHouseId;
                    const isOwner = gs.active_house === myHouseIdInt;
                    if (isOwner) {
                        // ถ้าเป็นเจ้าของข้อ ให้ล็อคปุ่มถาวรในเฟสนี้
                        statusText.innerText = "WAITING FOR STEAL";
                        questionInfo.innerText = "บ้านคุณไม่มีสิทธิ์ Steal ข้อนี้";
                        icon.innerText = "🚫";
                        text.innerText = "BLOCKED";
                        btn.disabled = true;
                        btn.classList.add('bg-slate-900', 'border-slate-800');
                    } 
                    else if (isWinner) {
                        // กรณีบ้านเรากดติด
                        if (statusText) statusText.innerText = "YOU BUZZED IN!";
                        if (body) body.classList.add('state-win');
                        if (questionInfo) questionInfo.innerText = "บ้านคุณได้สิทธิ์ตอบ!";
                        if (icon) icon.innerText = "🎯";
                        if (text) text.innerText = "ANSWER NOW";

                        btn.classList.add('buzzer-win');
                        btn.disabled = true;
                        if (ring) ring.classList.add('bg-emerald-500', 'opacity-30');
                        if (innerGlow) innerGlow.style.opacity = "1";
                    }
                    else if (someoneElseWon) {
                        // คำนวณเวลาที่ผ่านไปหลังจากบ้านแรกกด
                        const timeSinceWinner = buzzerData.timestamp ? (Date.now() - buzzerData.timestamp) : 0;
                        const isWindowOpen = timeSinceWinner < 5000; // ยังอยู่ในช่วง 5 วินาทีหรือไม่

                        if (isWindowOpen) {
                            // จังหวะที่มีคนชนะแล้ว แต่ยังไม่ครบ 5 วิ -> ให้บ้านอื่นกดเพื่อบันทึกเวลาได้
                            if (statusText) statusText.innerText = "ALMOST THERE!";
                            if (questionInfo) questionInfo.innerText = `บ้าน ${buzzerData.winner} กดไปแล้ว!`;
                            if (icon) icon.innerText = "⏱️";
                            if (text) text.innerText = "PRESS NOW!";

                            btn.disabled = false;
                            btn.classList.add('bg-orange-900', 'border-orange-700', 'animate-pulse');
                        } else {
                            // ครบ 5 วิแล้ว หรือกดไม่ทันช่วงโควต้า -> ปิดปุ่มถาวร
                            if (statusText) statusText.innerText = "TOO LATE!";
                            if (questionInfo) questionInfo.innerText = `หมดเวลาช่วง Steal แล้ว`;
                            if (icon) icon.innerText = "💨";
                            if (text) text.innerText = "LOCKED";

                            btn.disabled = true;
                            btn.classList.add('bg-red-950', 'border-red-900');
                        }
                    }
                    else if (gs.is_steal_open) {
                        // กรณีระบบเปิดให้แย่งกด (สถานะสำคัญ)
                        if (statusText) {
                            statusText.innerText = "STEAL NOW!";
                            statusText.classList.add('text-yellow-400');
                        }
                        if (body) body.classList.add('state-steal-open');
                        if (questionInfo) questionInfo.innerText = "กดเลยยยยย!!!";
                        if (icon) icon.innerText = "🚨";
                        if (text) text.innerText = "PRESS!";

                        btn.disabled = false;
                        btn.classList.add('buzzer-active', 'border-white');
                        if (ring) ring.classList.add('bg-yellow-500', 'opacity-40');
                        if (innerGlow) innerGlow.style.opacity = "1";
                        if (statusDot) statusDot.classList.add('bg-yellow-400', 'animate-ping');
                    } else {
                        // กรณีรอสัญญาณ Steal
                        if (statusText) statusText.innerText = "READY TO STEAL";
                        if (questionInfo) questionInfo.innerText = "เตรียมตัวกดปุ่ม...";
                        if (icon) icon.innerText = "✋";
                        if (text) text.innerText = "GET READY";

                        btn.disabled = false; // ให้กดได้เพื่อ trigger showEarlyAlert
                        btn.classList.add('bg-indigo-950', 'border-indigo-800');
                        if (statusDot) statusDot.classList.add('bg-indigo-400');
                    }
                }
            }

            window.handleBuzzIn = async function () {
                    const now = Date.now();
                    const gs = gameState.game_state;
                    const buzz = gameState.buzzers;
                    const myHouseIdInt = parseInt(myHouseId);

                    if (isStunned || now - lastClickTime < 200) return;
                    lastClickTime = now;

                    // เช็คว่าเคยกดไปแล้วหรือยัง (ป้องกันการส่งซ้ำในข้อเดิม)
                    if (buzz?.attempts && buzz.attempts[myHouseId]) return;

                    if (myHouseIdInt === gs.active_house) {
                        showToast("คุณเป็นเจ้าของข้อ ไม่สามารถ Steal ได้", "error");
                        return;
                    }

                    // --- [ระบบ STUN: กดก่อนเวลา] ---
                    if (!gs?.is_steal_open) {
                        if (gs?.status === 'STEAL_WAIT') {
                            isStunned = true;
                            const btn = document.getElementById('main-buzzer');
                            btn.classList.remove('bg-indigo-950', 'border-indigo-800');
                            btn.classList.add('bg-red-600', 'border-red-400', 'animate-pulse');
                            showEarlyAlert();
                            setTimeout(() => {
                                isStunned = false;
                                updateUI(gameState);
                            }, 1000);
                        }
                        return;
                    }

                    // --- [ระบบบันทึกเวลา] ---
                    // ถ้ามีคนชนะแล้ว ให้เช็คว่าเกิน 5 วิหรือยัง ถ้าเกินแล้วไม่ต้องทำอะไร
                    if (buzz?.is_locked && buzz?.timestamp) {
                        if (now - buzz.timestamp > 5000) return;
                    }

                    // ส่งเวลาการกดเข้า Firebase ทันที (เพื่อให้ Admin เห็นลำดับ)
                    const attemptUpdate = {};
                    attemptUpdate[`jeopardy/buzzers/attempts/${myHouseId}`] = now;
                    await update(ref(db), attemptUpdate);

                    // --- [ระบบตัดสินผู้ชนะคนแรก] ---
                    if (!buzz?.is_locked) {
                        if ("vibrate" in navigator) navigator.vibrate(100);
                        playBeep(660, 0.1);

                        const buzzerRef = ref(db, 'jeopardy/buzzers');
                        try {
                            const result = await runTransaction(buzzerRef, (currentData) => {
                                if (currentData === null || currentData.is_locked === false) {
                                    return { ...currentData, is_locked: true, winner: myHouseIdInt, timestamp: now };
                                }
                                return; // ถ้ามีคนตัดหน้าไปก่อน Transaction จะยกเลิกเอง
                            });

                            if (result.committed) {
                                await update(ref(db, 'jeopardy/game_state'), { answering_house: myHouseIdInt });
                            }
                        } catch (error) { console.error(error); }
                    } else {
                        // กรณีไม่ใช่คนแรกแต่ยังอยู่ใน 5 วิ
                        if ("vibrate" in navigator) navigator.vibrate(40);
                        playBeep(440, 0.05); // เสียงเบาลงเพื่อให้รู้ว่ากดติดแต่ไม่ชนะ
                        showToast("บันทึกเวลาเรียบร้อย!", "info");
                    }
                };
        // ฟังก์ชันแสดง Alert เวลาคนกดก่อนไฟเหลือง
    function showEarlyAlert() {
        const container = document.getElementById('early-msg-container');
        if (!container) return;

        // เปลี่ยนข้อความให้ชัดเจน
        container.innerHTML = `<div class="early-text text-center text-red-500 font-black animate-bounce">
        ⚠️ เร็วไป! ปุ่มล็อค 1.0s
    </div>`;

        if ("vibrate" in navigator) navigator.vibrate(300);

        // ลบข้อความหลัง 1 วิ
        setTimeout(() => { container.innerHTML = ""; }, 1000);
    }
        document.addEventListener('touchstart', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault(); // ป้องกันการใช้ 2 นิ้วขยาย
                }
            }, { passive: false });

            document.addEventListener('gesturestart', function (event) {
                event.preventDefault(); // ป้องกัน Gesture บน iOS
            });
    </script>

    
</body>

</html>
