<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - ไม่พบหน้าที่ต้องการ | Medentor Camp 13th System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full text-center">
        <!-- Illustration / Logo -->
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-blue-200 blur-3xl opacity-30 rounded-full"></div>
            <!-- ใส่ Path แบบเริ่มจาก root เพื่อป้องกันรูปหายเมื่อเข้า URL ลึกๆ -->
            <img src="assets/logo.png" id="err-logo" alt="Logo"
                class="h-32 w-32 mx-auto object-contain relative animate-float drop-shadow-2xl">
        </div>

        <!-- Error Message -->
        <h1 class="text-7xl font-black text-slate-800 mb-4">404</h1>
        <h2 class="text-2xl font-bold text-slate-700 mb-2">ไม่พบหน้าที่คุณต้องการ</h2>
        <p class="text-slate-500 mb-8 leading-relaxed">
            ขออภัย หน้าที่คุณพยายามเข้าถึงอาจถูกลบ ย้ายชื่อ <br>หรือไม่มีอยู่ในระบบ Medentor Camp
        </p>

        <!-- Redirect Notice & Button -->
        <div class="space-y-4">
            <p id="redirect-msg"
                class="text-sm text-blue-600 font-bold bg-blue-50 py-2 px-4 rounded-full inline-block border border-blue-100">
                ระบบจะพาคุณกลับ<span id="target-name">หน้าหลัก</span>ในอีก <span id="countdown">5</span> วินาที...
            </p>

            <div class="pt-4">
                <a href="index.html" id="back-btn"
                    class="inline-block bg-slate-800 hover:bg-black text-white px-8 py-3 rounded-2xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-xl shadow-slate-200">
                    กลับสู่หน้าหลักตอนนี้
                </a>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="mt-16 text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">
            © 2026 MEDENTOR CAMP SYSTEM | ACADEMIC DIVISION [PANAS MD52]
        </p>
    </div>

    <script>
        // 1. ตรวจสอบสถานะการ Login
        const session = localStorage.getItem("userSession");
        const isLoggedIn = session !== null;

        // 2. กำหนดเป้าหมาย (ถ้ายังไม่ Login ให้ไปหน้า Login)
        // หมายเหตุ: GitHub Pages มักใช้ Path แบบ relative จาก root
        const targetPage = isLoggedIn ? 'index.html' : 'pages/login.html';
        const targetText = isLoggedIn ? 'หน้าหลัก' : 'หน้าเข้าสู่ระบบ';

        // 3. อัปเดต UI ตามสิทธิ์
        const backBtn = document.getElementById('back-btn');
        const targetName = document.getElementById('target-name');

        backBtn.href = targetPage;
        backBtn.innerText = `กลับสู่${targetText}ตอนนี้`;
        targetName.innerText = targetText;

        // 4. ระบบนับถอยหลัง Redirect
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            if (countdownEl) countdownEl.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = targetPage;
            }
        }, 1000);

        // 5. ป้องกันรูปโลโก้หาย (กรณีอยู่ใน URL ที่ลึกเกินไป)
        document.getElementById('err-logo').onerror = function () {
            this.src = '../assets/logo.png'; // ลองถอยหลัง 1 ชั้นถ้าหาไม่เจอ
        };
    </script>
</body>

</html>
